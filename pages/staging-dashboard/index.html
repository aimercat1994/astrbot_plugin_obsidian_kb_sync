<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obsidian 暂存区</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css"/>
<style>
/* ===== App Shell ===== */
html, body { height: 100%; overflow: hidden; margin: 0; }
body {
  display: flex; flex-direction: column;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background: var(--color-base-100); color: var(--color-base-content);
}

/* ===== Layout ===== */
.app-shell { display: flex; flex: 1; min-height: 0; overflow: hidden; }

/* ===== Sidebar ===== */
.sidebar {
  width: 300px; min-width: 260px; max-width: 420px;
  display: flex; flex-direction: column;
  background: var(--color-base-100);
  border-right: 1px solid var(--color-base-300);
  overflow: hidden; flex-shrink: 0;
}
.sidebar-section { display: flex; flex-direction: column; overflow: hidden; }
.sidebar-section-header {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 16px; font-size: 0.75rem; font-weight: 600;
  color: var(--color-base-content);
  opacity: 0.5; text-transform: uppercase; letter-spacing: 0.5px;
  border-bottom: 1px solid var(--color-base-300);
  cursor: pointer; user-select: none;
}
.sidebar-section-header:hover { opacity: 0.7; }
.sidebar-section-body { flex: 1; overflow-y: auto; }

/* ===== Folder Tree ===== */
.folder-tree { list-style: none; margin: 0; padding: 4px 0; }
.folder-tree ul { list-style: none; margin: 0; padding: 0; }
.folder-node { position: relative; }
.folder-row {
  display: flex; align-items: center; gap: 4px;
  padding: 5px 12px; cursor: pointer; font-size: 0.84rem;
  border-radius: 6px; margin: 0 6px;
  transition: background 0.15s;
}
.folder-row:hover { background: var(--color-base-200); }
.folder-row.active {
  background: color-mix(in srgb, var(--color-primary) 12%, transparent);
  color: var(--color-primary); font-weight: 600;
}
.folder-row .folder-toggle {
  width: 18px; height: 18px; display: flex; align-items: center; justify-content: center;
  font-size: 0.65rem; color: var(--color-base-content); opacity: 0.4;
  transition: transform 0.2s; flex-shrink: 0;
}
.folder-row .folder-toggle.expanded { transform: rotate(90deg); }
.folder-row .folder-toggle.no-children { visibility: hidden; }
.folder-row .folder-icon { font-size: 0.9rem; flex-shrink: 0; }
.folder-row .folder-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.folder-row .folder-count {
  font-size: 0.7rem; opacity: 0.5;
  background: var(--color-base-300); color: var(--color-base-content);
  padding: 1px 6px; border-radius: 10px; min-width: 20px; text-align: center;
  flex-shrink: 0;
}
.folder-row.active .folder-count {
  background: var(--color-primary); color: var(--color-primary-content);
  opacity: 1;
}
.folder-children {
  overflow: hidden; transition: max-height 0.25s ease;
}
.folder-children.collapsed { max-height: 0 !important; }

/* ===== Document List ===== */
.doc-list { list-style: none; margin: 0; padding: 4px 0; }
.doc-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 16px; cursor: pointer; font-size: 0.82rem;
  transition: background 0.15s;
  border-bottom: 1px solid var(--color-base-200);
}
.doc-item:last-child { border-bottom: none; }
.doc-item:hover { background: var(--color-base-200); }
.doc-item.active {
  background: color-mix(in srgb, var(--color-primary) 10%, transparent);
  font-weight: 600;
}
.doc-item .doc-status {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
}
.doc-item .doc-status.synced { background: var(--color-success); box-shadow: 0 0 5px var(--color-success); }
.doc-item .doc-status.selected { background: var(--color-primary); }
.doc-item .doc-status.none { background: var(--color-base-300); }
.doc-item .doc-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.doc-item .doc-meta { font-size: 0.72rem; opacity: 0.45; white-space: nowrap; flex-shrink: 0; }

/* ===== Sidebar Search ===== */
.sidebar-search {
  padding: 8px 12px; border-bottom: 1px solid var(--color-base-300);
}
.sidebar-search input {
  width: 100%; padding: 5px 10px 5px 30px;
  font-size: 0.82rem; border-radius: 20px;
  border: 1px solid var(--color-base-300);
  background: var(--color-base-200);
  color: var(--color-base-content);
  outline: none; transition: border-color 0.2s;
}
.sidebar-search input:focus { border-color: var(--color-primary); }
.sidebar-search-wrap {
  position: relative;
}
.sidebar-search-wrap::before {
  content: '🔍'; position: absolute; left: 9px; top: 50%;
  transform: translateY(-50%); font-size: 0.75rem; pointer-events: none;
}

/* ===== Main Content ===== */
.main-content {
  flex: 1; display: flex; flex-direction: column;
  overflow: hidden; min-width: 0;
  background: var(--color-base-100);
}

/* ===== Top Bar ===== */
.topbar {
  display: flex; align-items: center; gap: 14px;
  padding: 0 20px; height: 52px; flex-shrink: 0;
  background: var(--color-base-100);
  border-bottom: 1px solid var(--color-base-300);
  position: relative;
}
.topbar::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--color-primary), var(--color-secondary), var(--color-accent));
  opacity: 0.6;
}
.topbar-title {
  font-size: 1.1rem; font-weight: 700;
  background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  display: flex; align-items: center; gap: 8px; white-space: nowrap;
}
.topbar-title .icon { -webkit-text-fill-color: initial; }
.topbar-spacer { flex: 1; }
.topbar-actions { display: flex; gap: 8px; align-items: center; }

/* Status badges */
.status-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 20px;
  font-size: 0.73rem; font-weight: 500;
  border: 1px solid var(--color-base-300);
  transition: all 0.2s;
}
.status-badge.connected {
  border-color: var(--color-success);
  background: color-mix(in srgb, var(--color-success) 10%, transparent);
  color: var(--color-success);
}
.status-badge.disconnected { opacity: 0.5; }
.status-badge .dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--color-base-300); transition: all 0.2s;
}
.status-badge.connected .dot {
  background: var(--color-success);
  box-shadow: 0 0 6px var(--color-success);
}

/* ===== Viewer ===== */
.viewer {
  flex: 1; display: flex; flex-direction: column;
  overflow: hidden; min-height: 0;
}
.viewer-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 20px; flex-shrink: 0;
  border-bottom: 1px solid var(--color-base-300);
}
.viewer-title {
  font-size: 0.95rem; font-weight: 600;
  display: flex; align-items: center; gap: 6px;
}
.viewer-actions { display: flex; gap: 6px; }
.viewer-body { flex: 1; overflow-y: auto; padding: 20px 24px; }

/* ===== Markdown Render ===== */
.md-render { font-size: 0.9rem; line-height: 1.8; }
.md-render h1 { font-size: 1.5rem; font-weight: 700; margin: 1.2rem 0 0.5rem; padding-bottom: 0.3rem; border-bottom: 2px solid color-mix(in srgb, var(--color-primary) 15%, transparent); }
.md-render h2 { font-size: 1.3rem; font-weight: 700; margin: 1rem 0 0.4rem; color: var(--color-primary); }
.md-render h3 { font-size: 1.1rem; font-weight: 600; margin: 0.8rem 0 0.3rem; }
.md-render h4 { font-size: 1rem; font-weight: 600; margin: 0.6rem 0 0.2rem; }
.md-render pre {
  background: var(--color-base-200); padding: 14px 16px;
  border-radius: 10px; overflow-x: auto; font-size: 0.82rem;
  border: 1px solid var(--color-base-300);
}
.md-render code { font-size: 0.85em; }
.md-render :not(pre) > code {
  background: color-mix(in srgb, var(--color-primary) 10%, transparent);
  color: var(--color-primary); padding: 2px 5px; border-radius: 4px;
}
.md-render blockquote {
  border-left: 3px solid var(--color-primary);
  padding: 8px 16px; margin: 0.8rem 0;
  background: color-mix(in srgb, var(--color-primary) 5%, transparent);
  border-radius: 0 6px 6px 0; font-style: italic;
}
.md-render img { max-width: 100%; border-radius: 10px; margin: 0.5rem 0; }
.md-render ul, .md-render ol { padding-left: 1.5rem; }
.md-render li { margin-bottom: 0.2rem; }
.md-render hr { border: none; border-top: 2px solid color-mix(in srgb, var(--color-primary) 10%, transparent); margin: 1rem 0; }
.md-render a { color: var(--color-primary); }
.md-render table { width: 100%; border-collapse: collapse; margin: 0.8rem 0; font-size: 0.85rem; }
.md-render th, .md-render td { padding: 8px 12px; border: 1px solid var(--color-base-300); }
.md-render th { background: color-mix(in srgb, var(--color-primary) 10%, transparent); font-weight: 600; text-align: left; }

/* Editor */
.editor-textarea {
  width: 100%; height: 100%; resize: none; border: none; outline: none;
  background: var(--color-base-100); color: var(--color-base-content);
  padding: 16px 20px; font-size: 0.85rem; line-height: 1.7;
  font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
  tab-size: 2;
}

/* Empty states */
.empty-state {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px; opacity: 0.35;
}

/* ===== Bottom Bar ===== */
.bottombar {
  display: flex; align-items: center; gap: 10px;
  padding: 0 20px; height: 30px; flex-shrink: 0;
  background: var(--color-base-100);
  border-top: 1px solid var(--color-base-300);
  font-size: 0.74rem; opacity: 0.5;
}
.bottombar .sep { opacity: 0.25; }
.bottombar .highlight { color: var(--color-primary); font-weight: 600; opacity: 1; }

/* ===== Toast ===== */
.toast-wrap {
  position: fixed; top: 60px; right: 16px; z-index: 9999;
  display: flex; flex-direction: column; gap: 8px; pointer-events: none;
}
.toast-item {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px; border-radius: 10px;
  font-size: 0.84rem; color: #fff;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  pointer-events: auto; animation: toast-in 0.3s ease-out;
  backdrop-filter: blur(8px); max-width: 380px;
}
.toast-item.info { background: linear-gradient(135deg, #6366f1, #818cf8); }
.toast-item.success { background: linear-gradient(135deg, #16a34a, #22c55e); }
.toast-item.error { background: linear-gradient(135deg, #dc2626, #ef4444); }
.toast-item.warning { background: linear-gradient(135deg, #d97706, #f59e0b); }
.toast-item.fade-out { opacity: 0; transform: translateX(20px); transition: all 0.3s; }
@keyframes toast-in { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--color-base-300); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--color-primary); }
::selection { background: color-mix(in srgb, var(--color-primary) 20%, transparent); }

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .sidebar { width: 100%; max-width: none; border-right: none; }
  .main-content { display: none; }
}
</style>
</head>
<body>

<!-- ===== Top Bar ===== -->
<header class="topbar">
  <div class="topbar-title"><span class="icon">📚</span> Obsidian 暂存区</div>
  <div style="display:flex;gap:8px;">
    <span class="status-badge" id="fnsStatus"><span class="dot" id="fnsDot"></span>FNS</span>
    <span class="status-badge" id="kbStatus"><span class="dot" id="kbDot"></span>知识库</span>
  </div>
  <div class="topbar-spacer"></div>
  <div class="topbar-actions">
    <button class="btn btn-sm btn-ghost border border-base-300" id="btnSyncFns" onclick="syncFns()">📥 从 FNS 同步</button>
    <button class="btn btn-sm btn-success text-white" id="btnSyncKb" onclick="syncKb()">📤 同步到知识库</button>
    <label class="swap swap-rotate btn btn-ghost btn-sm btn-circle text-lg" title="切换主题">
      <input type="checkbox" id="themeToggle" onchange="toggleTheme()">
      <span class="swap-on">☀️</span><span class="swap-off">🌙</span>
    </label>
  </div>
</header>

<!-- ===== App Shell ===== -->
<div class="app-shell">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <!-- Folder Section -->
    <div class="sidebar-section" style="flex:0 0 auto; max-height:50%; display:flex; flex-direction:column; overflow:hidden;">
      <div class="sidebar-section-header" onclick="toggleSection('folder')">
        <span id="folderChevron" style="transition:transform 0.2s;">▾</span>
        📁 文件夹
        <span style="margin-left:auto;font-size:0.7rem;opacity:0.5;" id="folderCount"></span>
      </div>
      <div class="sidebar-section-body" id="folderBody">
        <ul class="folder-tree" id="folderTree"></ul>
      </div>
    </div>

    <!-- Divider -->
    <div style="height:1px;background:var(--color-base-300);flex-shrink:0;"></div>

    <!-- Doc List Section -->
    <div class="sidebar-section" style="flex:1; display:flex; flex-direction:column; overflow:hidden; min-height:0;">
      <div class="sidebar-section-header">
        📄 文档列表
        <span style="margin-left:auto;font-size:0.7rem;opacity:0.5;" id="docCount"></span>
      </div>
      <div class="sidebar-search">
        <div class="sidebar-search-wrap">
          <input type="search" placeholder="搜索文件名..." id="searchInput" oninput="onSearch()">
        </div>
      </div>
      <div class="sidebar-section-body" id="docListBody">
        <ul class="doc-list" id="docList"></ul>
        <div class="empty-state" id="docListEmpty" style="display:none;">
          <span style="font-size:2.5rem;">📄</span>
          <span style="font-size:0.82rem;">暂无文档</span>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="main-content">
    <!-- Viewer Header -->
    <div class="viewer-header">
      <span class="viewer-title" id="viewerTitle"><span>📄</span> 选择文档以预览</span>
      <div class="viewer-actions" id="viewerActions" style="display:none;">
        <button class="btn btn-xs btn-ghost border border-base-300" id="btnEdit" onclick="toggleEdit()">✏️ 编辑</button>
        <button class="btn btn-xs btn-primary text-white" id="btnSave" onclick="saveDoc()" style="display:none;">💾 保存</button>
        <button class="btn btn-xs btn-ghost border border-base-300" id="btnCancel" onclick="cancelEdit()" style="display:none;">取消</button>
      </div>
    </div>
    <!-- Viewer Body -->
    <div class="viewer-body" id="viewerContent">
      <div class="empty-state">
        <span style="font-size:3rem;">👀</span>
        <span style="font-size:0.85rem;">点击左侧文档查看内容</span>
      </div>
    </div>
  </div>

</div>

<!-- ===== Bottom Bar ===== -->
<footer class="bottombar">
  <span>共 <span class="highlight" id="statTotal">0</span> 篇</span>
  <span class="sep">|</span>
  <span>已选 <span class="highlight" id="statSelected">0</span> 篇</span>
  <span class="sep">|</span>
  <span>已同步 <span class="highlight" id="statSynced">0</span> 篇</span>
  <span class="sep">|</span>
  <span id="statLastSync">上次同步: --</span>
</footer>

<!-- Toast -->
<div class="toast-wrap" id="toastContainer"></div>

<!-- Bridge SDK -->
<script src="/api/plugin/page/bridge-sdk.js"></script>

<script>
/* ===== State ===== */
let state = {
  folderTree: null,
  documents: [],
  currentFolder: null,
  currentDoc: null,
  editing: false,
  originalContent: '',
  searchQuery: '',
  lastFnsSync: null,
  lastKbSync: null,
  expandedFolders: new Set(),
};

/* ===== Bridge / API ===== */
const bridge = window.AstrBotPluginPage;
function isBridge() { return bridge && typeof bridge.apiGet === 'function'; }

async function api(path, opts = {}) {
  const method = (opts.method || 'GET').toUpperCase();
  if (isBridge()) {
    const endpoint = path.replace(/^\//, '');
    try {
      if (method === 'GET') return await bridge.apiGet(endpoint, opts.params || {});
      const body = opts.body ? (typeof opts.body === 'string' ? JSON.parse(opts.body) : opts.body) : {};
      return await bridge.apiPost(endpoint, body);
    } catch (e) { throw new Error(e.message || 'Bridge API error'); }
  } else {
    let url = path;
    if (opts.params && Object.keys(opts.params).length > 0) {
      const qs = Object.entries(opts.params).map(([k,v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`).join('&');
      url += (url.includes('?') ? '&' : '?') + qs;
    }
    const fetchOpts = { headers: {'Content-Type': 'application/json'} };
    if (opts.method) fetchOpts.method = opts.method;
    if (opts.body) fetchOpts.body = opts.body;
    const res = await fetch(url, fetchOpts);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }
}

/* ===== Theme ===== */
function initTheme() {
  let isDark = false;
  if (isBridge()) { const ctx = bridge.getContext(); if (ctx && ctx.isDark !== undefined) isDark = ctx.isDark; }
  else { try { isDark = localStorage.getItem('staging-theme') === 'dark'; } catch (e) {} }
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('themeToggle').checked = isDark;
}
function toggleTheme() {
  const isDark = document.getElementById('themeToggle').checked;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  try { localStorage.setItem('staging-theme', isDark ? 'dark' : 'light'); } catch (e) {}
}

/* ===== Toast ===== */
function toast(msg, type = 'info') {
  const container = document.getElementById('toastContainer');
  const icons = { info: 'ℹ️', success: '✅', error: '❌', warning: '⚠️' };
  const el = document.createElement('div');
  el.className = `toast-item ${type}`;
  el.innerHTML = `<span>${icons[type] || ''}</span><span>${escapeHtml(msg)}</span>`;
  container.appendChild(el);
  setTimeout(() => { el.classList.add('fade-out'); setTimeout(() => el.remove(), 300); }, 3500);
}

/* ===== Status ===== */
async function loadStatus() {
  try {
    const s = await api('api/status');
    document.getElementById('statTotal').textContent = s.total_documents ?? 0;
    document.getElementById('statSelected').textContent = s.selected_for_sync ?? 0;
    document.getElementById('statSynced').textContent = s.synced_to_kb ?? 0;
    document.getElementById('statLastSync').textContent = `上次同步: ${state.lastFnsSync ? formatTime(state.lastFnsSync) : '--'}`;
    updateBadge('fnsStatus', 'fnsDot', !!state.lastFnsSync);
    updateBadge('kbStatus', 'kbDot', !!state.lastKbSync);
  } catch (e) { console.error('Status load failed:', e); }
}
function updateBadge(badgeId, dotId, ok) {
  const badge = document.getElementById(badgeId);
  badge.className = 'status-badge ' + (ok ? 'connected' : 'disconnected');
}
function formatTime(ts) {
  if (!ts) return '--';
  const d = new Date(typeof ts === 'number' ? ts * 1000 : ts);
  if (isNaN(d.getTime())) return '--';
  const pad = n => String(n).padStart(2, '0');
  return `${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function formatSize(kb) {
  if (kb == null) return '--';
  if (kb < 1) return `${(kb * 1024).toFixed(0)} B`;
  if (kb < 1024) return `${kb.toFixed(1)} KB`;
  return `${(kb / 1024).toFixed(1)} MB`;
}

/* ===== Folders ===== */
async function loadFolders() {
  try {
    const tree = await api('api/folders');
    state.folderTree = tree;
    // Auto-expand root level
    for (const key of Object.keys(tree)) {
      if (key !== '__files__') state.expandedFolders.add(key);
    }
    renderFolders();
  } catch (e) { console.error('Folders load failed:', e); toast('加载文件夹失败', 'error'); }
}

function _countFiles(node) {
  let count = (node.__files__ || []).length;
  for (const [k, v] of Object.entries(node)) { if (k !== '__files__') count += _countFiles(v); }
  return count;
}

function _renderFolderTree(node, prefix, depth) {
  let html = '';
  for (const [name, child] of Object.entries(node)) {
    if (name === '__files__') continue;
    const fullPath = prefix ? `${prefix}/${name}` : name;
    const count = _countFiles(child);
    const hasChildren = Object.keys(child).some(k => k !== '__files__');
    const isExpanded = state.expandedFolders.has(fullPath);
    const isActive = state.currentFolder === fullPath;
    const indent = depth * 14;
    html += `<li class="folder-node">
      <div class="folder-row ${isActive ? 'active' : ''}" style="padding-left:${10 + indent}px"
           onclick="selectFolder('${escapeAttr(fullPath)}')">
        <span class="folder-toggle ${hasChildren ? (isExpanded ? 'expanded' : '') : 'no-children'}"
              onclick="event.stopPropagation(); toggleFolder('${escapeAttr(fullPath)}')">▶</span>
        <span class="folder-icon">${hasChildren ? (isExpanded ? '📂' : '📁') : '📄'}</span>
        <span class="folder-name" title="${escapeAttr(fullPath)}">${escapeHtml(name)}</span>
        <span class="folder-count">${count}</span>
      </div>`;
    if (hasChildren) {
      html += `<ul class="folder-children ${isExpanded ? '' : 'collapsed'}"
                   style="${isExpanded ? '' : 'max-height:0'}">`;
      html += _renderFolderTree(child, fullPath, depth + 1);
      html += '</ul>';
    }
    html += '</li>';
  }
  return html;
}

function renderFolders() {
  const tree = document.getElementById('folderTree');
  const totalCount = state.folderTree ? _countFiles(state.folderTree) : 0;
  document.getElementById('folderCount').textContent = totalCount + ' 篇';
  const isActive = state.currentFolder === null;
  let html = `<li class="folder-node">
    <div class="folder-row ${isActive ? 'active' : ''}" onclick="selectFolder(null)">
      <span class="folder-toggle no-children">▶</span>
      <span class="folder-icon">📋</span>
      <span class="folder-name">全部</span>
      <span class="folder-count">${totalCount}</span>
    </div>
  </li>`;
  if (state.folderTree) html += _renderFolderTree(state.folderTree, '', 0);
  tree.innerHTML = html;
}

function toggleFolder(path) {
  if (state.expandedFolders.has(path)) state.expandedFolders.delete(path);
  else state.expandedFolders.add(path);
  renderFolders();
}

function selectFolder(path) {
  state.currentFolder = path;
  renderFolders();
  loadDocuments();
}

function toggleSection(section) {
  const body = document.getElementById(section + 'Body');
  const chevron = document.getElementById(section + 'Chevron');
  if (body.style.display === 'none') {
    body.style.display = '';
    chevron.style.transform = '';
  } else {
    body.style.display = 'none';
    chevron.style.transform = 'rotate(-90deg)';
  }
}

/* ===== Documents ===== */
async function loadDocuments() {
  try {
    const params = {};
    if (state.currentFolder) params.folder = state.currentFolder;
    const data = await api('api/documents', { params });
    state.documents = Array.isArray(data) ? data : (data.documents || []);
    renderDocuments();
  } catch (e) { console.error('Documents load failed:', e); toast('加载文档失败', 'error'); }
}

function getFilteredDocs() {
  let docs = [...state.documents];
  if (state.searchQuery) {
    const q = state.searchQuery.toLowerCase();
    docs = docs.filter(d => (d.path || '').toLowerCase().includes(q));
  }
  docs.sort((a, b) => String((a.path||'').split('/').pop()).localeCompare(String((b.path||'').split('/').pop())));
  return docs;
}

function renderDocuments() {
  const docs = getFilteredDocs();
  const list = document.getElementById('docList');
  const empty = document.getElementById('docListEmpty');
  document.getElementById('docCount').textContent = docs.length + ' 篇';
  if (docs.length === 0) { list.innerHTML = ''; empty.style.display = ''; return; }
  empty.style.display = 'none';
  list.innerHTML = docs.map(d => {
    const name = (d.path || '').split('/').pop();
    const statusClass = d.kb_doc_id ? 'synced' : (d.sync_to_kb ? 'selected' : 'none');
    const isActive = state.currentDoc && state.currentDoc.path === d.path;
    return `<li class="doc-item ${isActive ? 'active' : ''}" onclick="selectDoc('${escapeAttr(d.path)}')">
      <span class="doc-status ${statusClass}" title="${d.kb_doc_id ? '已同步' : (d.sync_to_kb ? '待同步' : '未选择')}"></span>
      <span class="doc-name" title="${escapeAttr(d.path)}">${escapeHtml(name)}</span>
      <span class="doc-meta">${formatSize(d.size_kb)}</span>
    </li>`;
  }).join('');
}

function onSearch() {
  state.searchQuery = document.getElementById('searchInput').value.trim();
  renderDocuments();
}

/* ===== Document Viewer ===== */
async function selectDoc(path) {
  if (state.editing) { if (!confirm('正在编辑，放弃修改？')) return; state.editing = false; }
  const doc = state.documents.find(d => d.path === path);
  if (!doc) return;
  state.currentDoc = doc;
  renderDocuments();
  const name = (doc.path || '').split('/').pop();
  document.getElementById('viewerTitle').innerHTML = `<span>📄</span> ${escapeHtml(name)}`;
  document.getElementById('viewerActions').style.display = '';
  const content = document.getElementById('viewerContent');
  content.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;"><span class="loading loading-spinner loading-lg text-primary"></span></div>';
  try {
    const data = await api('api/document', { params: { path } });
    state.originalContent = data.content || '';
    renderMarkdown(state.originalContent);
  } catch (e) {
    content.innerHTML = `<div class="empty-state"><span style="font-size:2.5rem;">❌</span><span style="font-size:0.82rem;">加载失败: ${escapeHtml(e.message)}</span></div>`;
  }
}

function renderMarkdown(text) {
  document.getElementById('viewerContent').innerHTML = `<div class="md-render">${mdToHtml(text)}</div>`;
  postRenderLinks();
}

function mdToHtml(md) {
  if (!md) return '';
  let html = escapeHtml(md);
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, l, c) => `<pre><code class="lang-${l}">${c}</code></pre>`);
  html = html.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  html = html.replace(/^---+$/gm, '<hr>');
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a data-href="$2" target="_blank" rel="noopener" class="md-link">$1</a>');
  html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<span class="md-img" data-url="$2">[image: $1]</span>');
  html = html.replace(/^[\-\*] (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  html = html.replace(/\n\n+/g, '</p><p>');
  html = html.replace(/\n/g, '<br>');
  if (!html.startsWith('<')) html = '<p>' + html + '</p>';
  html = html.replace(/<p>\s*<\/p>/g, '');
  return html;
}

function postRenderLinks() {
  document.querySelectorAll('.md-link[data-href]').forEach(el => {
    el.setAttribute('href', el.getAttribute('data-href'));
    el.removeAttribute('data-href');
  });
  document.querySelectorAll('.md-img[data-url]').forEach(el => {
    const url = el.getAttribute('data-url');
    const alt = el.textContent.replace(/\[image: |\]/g, '');
    const img = document.createElement('img');
    img.src = url; img.alt = alt;
    img.style.cssText = 'max-width:100%;border-radius:10px;margin:0.5rem 0;';
    el.replaceWith(img);
  });
}

/* ===== Edit Mode ===== */
function toggleEdit() {
  state.editing = true;
  document.getElementById('viewerContent').innerHTML = `<textarea class="editor-textarea" id="editorArea">${escapeHtml(state.originalContent)}</textarea>`;
  document.getElementById('btnEdit').style.display = 'none';
  document.getElementById('btnSave').style.display = '';
  document.getElementById('btnCancel').style.display = '';
}
function cancelEdit() {
  state.editing = false;
  renderMarkdown(state.originalContent);
  document.getElementById('btnEdit').style.display = '';
  document.getElementById('btnSave').style.display = 'none';
  document.getElementById('btnCancel').style.display = 'none';
}
async function saveDoc() {
  const ta = document.getElementById('editorArea');
  if (!ta) return;
  try {
    await api('api/document', { method: 'POST', body: JSON.stringify({ path: state.currentDoc.path, content: ta.value }) });
    state.originalContent = ta.value; state.editing = false;
    renderMarkdown(ta.value);
    document.getElementById('btnEdit').style.display = '';
    document.getElementById('btnSave').style.display = 'none';
    document.getElementById('btnCancel').style.display = 'none';
    toast('文档已保存', 'success');
  } catch (e) { toast('保存失败: ' + e.message, 'error'); }
}

/* ===== Sync ===== */
async function syncFns() {
  const btn = document.getElementById('btnSyncFns');
  btn.disabled = true; btn.innerHTML = '<span class="loading loading-spinner loading-xs"></span> 同步中...';
  try {
    const data = await api('api/sync/fns', { method: 'POST' });
    if (data.error) { toast('FNS 同步失败: ' + data.error, 'error'); return; }
    state.lastFnsSync = Date.now() / 1000;
    toast(`FNS 同步完成: 新增 ${data.new||0}, 更新 ${data.updated||0}, 未变 ${data.unchanged||0}`, 'success');
    await Promise.all([loadFolders(), loadDocuments(), loadStatus()]);
  } catch (e) { toast('FNS 同步失败: ' + e.message, 'error'); }
  finally { btn.disabled = false; btn.innerHTML = '📥 从 FNS 同步'; }
}
async function syncKb() {
  const btn = document.getElementById('btnSyncKb');
  btn.disabled = true; btn.innerHTML = '<span class="loading loading-spinner loading-xs"></span> 同步中...';
  try {
    const data = await api('api/sync/kb', { method: 'POST' });
    if (data.error) { toast('知识库同步失败: ' + data.error, 'error'); return; }
    state.lastKbSync = Date.now() / 1000;
    toast(`知识库同步完成: 新增 ${data.new||0}, 更新 ${data.updated||0}${data.errors ? ', 失败 '+data.errors+' 篇' : ''}`, data.errors ? 'warning' : 'success');
    await Promise.all([loadStatus(), loadDocuments()]);
  } catch (e) { toast('知识库同步失败: ' + e.message, 'error'); }
  finally { btn.disabled = false; btn.innerHTML = '📤 同步到知识库'; }
}

/* ===== Utilities ===== */
function escapeHtml(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }
function escapeAttr(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

/* ===== Init ===== */
async function init() {
  if (isBridge()) {
    try { await Promise.race([bridge.ready(), new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 3000))]); }
    catch (e) { console.warn('bridge.ready():', e.message); }
  }
  initTheme();
  if (isBridge()) {
    bridge.onContext(ctx => {
      if (ctx && ctx.isDark !== undefined) {
        document.documentElement.setAttribute('data-theme', ctx.isDark ? 'dark' : 'light');
        document.getElementById('themeToggle').checked = ctx.isDark;
      }
    });
  }
  await Promise.all([loadFolders(), loadDocuments(), loadStatus()]);
  setInterval(loadStatus, 30000);
}

document.addEventListener('keydown', e => { if ((e.ctrlKey||e.metaKey) && e.key==='s') { e.preventDefault(); saveDoc(); } });
init().catch(e => { console.error('Init failed:', e); toast('初始化失败: ' + e.message, 'error'); });
window.onerror = (msg, url, line) => { console.error('Global error:', msg, url, line); toast(`JS Error: ${msg} (line ${line})`, 'error'); };
window.addEventListener('unhandledrejection', e => { console.error('Unhandled rejection:', e.reason); toast('Promise Error: ' + (e.reason?.message||e.reason||'unknown'), 'error'); });
</script>
