<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obsidian 暂存区</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css"/>
<style type="text/tailwindcss">
@custom-variant dark (&:where([data-theme=dark], [data-theme=dark] *));

/* App shell */
html, body { @apply h-full overflow-hidden; }
body { @apply m-0 font-sans; }

/* Markdown content */
.md-render { @apply text-base leading-7; }
.md-render h1 { @apply text-2xl font-bold mt-6 mb-3 pb-2 border-b-2 border-primary/20; }
.md-render h2 { @apply text-xl font-bold mt-5 mb-2 text-primary; }
.md-render h3 { @apply text-lg font-semibold mt-4 mb-2; }
.md-render h4 { @apply text-base font-semibold mt-3 mb-1; }
.md-render pre {
  @apply bg-base-200 p-4 rounded-xl overflow-x-auto text-sm
         border border-base-300 shadow-sm;
}
.md-render code { @apply text-sm; }
.md-render :not(pre) > code {
  @apply bg-primary/10 text-primary px-1.5 py-0.5 rounded;
}
.md-render blockquote {
  @apply border-l-4 border-primary pl-4 my-3 py-2
         bg-primary/5 rounded-r-lg italic;
}
.md-render img { @apply max-w-full rounded-xl shadow-md my-3; }
.md-render ul, .md-render ol { @apply pl-6 my-2; }
.md-render li { @apply mb-1; }
.md-render hr { @apply border-t-2 border-primary/10 my-4; }
.md-render a { @apply text-primary underline decoration-primary/30 hover:decoration-primary transition-colors; }
.md-render table { @apply w-full border-collapse my-3 text-sm; }
.md-render th { @apply bg-primary/10 font-semibold text-left p-2 border border-base-300; }
.md-render td { @apply p-2 border border-base-300; }
.md-render strong { @apply font-bold; }
.md-render em { @apply italic; }

/* Editor */
.editor-textarea {
  @apply w-full h-full resize-none border-0 outline-none
         bg-base-100 text-base-content p-4 leading-relaxed;
  font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
  font-size: 0.85rem;
  tab-size: 2;
}

/* Folder active indicator */
.folder-active-indicator {
  @apply absolute left-0 top-1 bottom-1 w-1 rounded-r-full bg-primary;
}

/* Sort indicators */
th.sort-asc::after { content: ' ▲'; @apply text-xs text-primary; }
th.sort-desc::after { content: ' ▼'; @apply text-xs text-primary; }

/* Toast animation */
@keyframes toast-slide-in {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}
.toast-animate-in { animation: toast-slide-in 0.3s ease-out; }

/* Status dot glow */
.dot-glow-success { box-shadow: 0 0 6px oklch(var(--su)); }
.dot-glow-error   { box-shadow: 0 0 6px oklch(var(--er)); }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  @apply bg-base-300 rounded-full;
}
::-webkit-scrollbar-thumb:hover { @apply bg-primary; }

/* Selection */
::selection { @apply bg-primary/20; }
</style>
</head>
<body class="flex flex-col bg-base-100 text-base-content">

<!-- ===== Top Bar ===== -->
<div class="navbar bg-base-100 border-b border-base-300 shadow-sm shrink-0 px-4 min-h-[56px]
            relative after:absolute after:bottom-0 after:left-0 after:right-0 after:h-[2px]
            after:bg-gradient-to-r after:from-primary after:via-secondary after:to-accent after:opacity-60">
  <div class="navbar-start gap-3">
    <span class="text-xl">📚</span>
    <span class="text-lg font-bold bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">
      Obsidian 暂存区
    </span>
  </div>
  <div class="navbar-center gap-2">
    <div class="badge badge-sm gap-1.5 py-2.5 px-3 font-medium" id="fnsStatus">
      <span class="w-2 h-2 rounded-full bg-base-300 inline-block dot-glow" id="fnsDot"></span>
      FNS
    </div>
    <div class="badge badge-sm gap-1.5 py-2.5 px-3 font-medium" id="kbStatus">
      <span class="w-2 h-2 rounded-full bg-base-300 inline-block dot-glow" id="kbDot"></span>
      知识库
    </div>
  </div>
  <div class="navbar-end gap-2">
    <button class="btn btn-sm btn-ghost border border-base-300 gap-1" id="btnSyncFns" onclick="syncFns()">
      📥 从 FNS 同步
    </button>
    <button class="btn btn-sm btn-success text-white gap-1" id="btnSyncKb" onclick="syncKb()">
      📤 同步到知识库
    </button>
    <label class="swap swap-rotate btn btn-ghost btn-sm btn-circle text-lg">
      <input type="checkbox" id="themeToggle" onchange="toggleTheme()">
      <span class="swap-on">☀️</span>
      <span class="swap-off">🌙</span>
    </label>
  </div>
</div>

<!-- ===== Main ===== -->
<div class="flex flex-1 overflow-hidden min-h-0">

  <!-- Sidebar -->
  <aside class="w-[230px] shrink-0 bg-base-100 border-r border-base-300 flex flex-col overflow-hidden">
    <div class="px-4 py-3 text-xs font-semibold text-base-content/50 uppercase tracking-wider border-b border-base-300">
      📁 文件夹
    </div>
    <div class="flex-1 overflow-y-auto py-2 space-y-0.5" id="folderList"></div>
  </aside>

  <!-- Content -->
  <main class="flex-1 flex flex-col overflow-hidden min-w-0">

    <!-- Toolbar -->
    <div class="flex items-center gap-3 px-4 py-2.5 bg-base-100 border-b border-base-300 shrink-0">
      <label class="input input-sm input-bordered flex items-center gap-2 flex-1 max-w-[320px] rounded-full">
        🔍
        <input type="search" placeholder="搜索文件名..." class="grow" id="searchInput" oninput="onSearch()">
      </label>
      <div class="flex gap-1.5">
        <button class="btn btn-xs btn-ghost border border-base-300" onclick="batchSetSync(true)">全选同步</button>
        <button class="btn btn-xs btn-ghost border border-base-300" onclick="batchSetChunk(true)">全选预切块</button>
        <button class="btn btn-xs btn-ghost border border-base-300" onclick="batchClear()">取消全选</button>
      </div>
    </div>

    <!-- Split View -->
    <div class="flex flex-1 overflow-hidden min-h-0">

      <!-- Doc List -->
      <div class="flex-1 flex flex-col overflow-hidden min-w-0 border-r border-base-300">
        <div class="flex-1 overflow-auto" id="docTableWrapper">
          <table class="table table-sm table-pin-rows" id="docTable">
            <thead>
              <tr class="bg-base-100">
                <th class="w-10 text-center">同步</th>
                <th class="w-10 text-center">切块</th>
                <th class="cursor-pointer select-none hover:text-primary" onclick="sortBy('name')" data-sort="name">文件名</th>
                <th class="cursor-pointer select-none hover:text-primary w-20" onclick="sortBy('size_kb')" data-sort="size_kb">大小</th>
                <th class="cursor-pointer select-none hover:text-primary w-28" onclick="sortBy('last_sync')" data-sort="last_sync">最后同步</th>
              </tr>
            </thead>
            <tbody id="docTableBody"></tbody>
          </table>
        </div>
        <div class="flex-1 flex flex-col items-center justify-center gap-2 text-base-content/40" id="docListEmpty" style="display:none">
          <span class="text-5xl">📄</span>
          <span class="text-sm">暂无文档</span>
        </div>
      </div>

      <!-- Viewer -->
      <div class="flex-1 flex flex-col overflow-hidden min-w-0">
        <div class="flex items-center justify-between px-4 py-2.5 bg-base-100 border-b border-base-300 shrink-0">
          <span class="font-semibold text-sm flex items-center gap-2" id="viewerTitle">
            <span>📄</span> 选择文档以预览
          </span>
          <div class="flex gap-1.5" id="viewerActions" style="display:none">
            <button class="btn btn-xs btn-ghost border border-base-300 gap-1" id="btnEdit" onclick="toggleEdit()">✏️ 编辑</button>
            <button class="btn btn-xs btn-primary text-white gap-1" id="btnSave" onclick="saveDoc()" style="display:none">💾 保存</button>
            <button class="btn btn-xs btn-ghost border border-base-300" id="btnCancel" onclick="cancelEdit()" style="display:none">取消</button>
          </div>
        </div>
        <div class="flex-1 overflow-y-auto p-5" id="viewerContent">
          <div class="flex flex-col items-center justify-center h-full gap-3 text-base-content/40">
            <span class="text-5xl">👀</span>
            <span class="text-sm">点击左侧文档查看内容</span>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- ===== Bottom Bar ===== -->
<div class="flex items-center gap-3 px-5 h-8 bg-base-100 border-t border-base-300
            text-xs text-base-content/50 shrink-0 tabular-nums" id="bottomBar">
  <span>共 <span class="text-primary font-semibold" id="statTotal">0</span> 篇</span>
  <span class="opacity-20">|</span>
  <span>已选 <span class="text-primary font-semibold" id="statSelected">0</span> 篇</span>
  <span class="opacity-20">|</span>
  <span>已同步 <span class="text-primary font-semibold" id="statSynced">0</span> 篇</span>
  <span class="opacity-20">|</span>
  <span id="statLastSync">上次同步: --</span>
</div>

<!-- Toast Container -->
<div class="fixed top-[64px] right-4 z-[9999] flex flex-col gap-2 pointer-events-none" id="toastContainer"></div>

<!-- Bridge SDK -->
<script src="/api/plugin/page/bridge-sdk.js"></script>

<script>
/* ===== State ===== */
let state = {
  folders: [],
  folderTree: null,
  documents: [],
  currentFolder: null,
  currentDoc: null,
  editing: false,
  originalContent: '',
  sortField: 'name',
  sortAsc: true,
  searchQuery: '',
  lastFnsSync: null,
  lastKbSync: null,
};

/* ===== Bridge / API ===== */
const bridge = window.AstrBotPluginPage;

function isBridge() {
  return bridge && typeof bridge.apiGet === 'function';
}

async function api(path, opts = {}) {
  const method = (opts.method || 'GET').toUpperCase();
  if (isBridge()) {
    const endpoint = path.replace(/^\//, '');
    try {
      if (method === 'GET') {
        return await bridge.apiGet(endpoint, opts.params || {});
      } else {
        const body = opts.body
          ? (typeof opts.body === 'string' ? JSON.parse(opts.body) : opts.body)
          : {};
        return await bridge.apiPost(endpoint, body);
      }
    } catch (e) {
      throw new Error(e.message || 'Bridge API error');
    }
  } else {
    let url = path;
    if (opts.params && Object.keys(opts.params).length > 0) {
      const qs = Object.entries(opts.params)
        .map(([k,v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`)
        .join('&');
      url += (url.includes('?') ? '&' : '?') + qs;
    }
    const fetchOpts = { headers: {'Content-Type': 'application/json'} };
    if (opts.method) fetchOpts.method = opts.method;
    if (opts.body) fetchOpts.body = opts.body;
    const res = await fetch(url, fetchOpts);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }
}

/* ===== Theme ===== */
function initTheme() {
  let isDark = false;
  if (isBridge()) {
    const ctx = bridge.getContext();
    if (ctx && ctx.isDark !== undefined) isDark = ctx.isDark;
  } else {
    try { isDark = localStorage.getItem('staging-theme') === 'dark'; } catch (e) {}
  }
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('themeToggle').checked = isDark;
}

function toggleTheme() {
  const isDark = document.getElementById('themeToggle').checked;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  try { localStorage.setItem('staging-theme', isDark ? 'dark' : 'light'); } catch (e) {}
}

/* ===== Toast ===== */
function toast(msg, type = 'info') {
  const container = document.getElementById('toastContainer');
  const icons = { info: 'ℹ️', success: '✅', error: '❌', warning: '⚠️' };
  const colors = {
    info: 'alert-info',
    success: 'alert-success',
    error: 'alert-error',
    warning: 'alert-warning'
  };
  const el = document.createElement('div');
  el.className = `alert ${colors[type] || 'alert-info'} shadow-lg pointer-events-auto toast-animate-in text-sm py-2 px-4 gap-2`;
  el.innerHTML = `<span>${icons[type] || ''}</span><span>${escapeHtml(msg)}</span>`;
  container.appendChild(el);
  setTimeout(() => {
    el.style.opacity = '0';
    el.style.transform = 'translateX(20px)';
    el.style.transition = 'all 0.3s ease';
    setTimeout(() => el.remove(), 300);
  }, 3500);
}

/* ===== Status ===== */
async function loadStatus() {
  try {
    const s = await api('api/status');
    document.getElementById('statTotal').textContent = s.total_documents ?? 0;
    document.getElementById('statSelected').textContent = s.selected_for_sync ?? 0;
    document.getElementById('statSynced').textContent = s.synced_to_kb ?? 0;
    document.getElementById('statLastSync').textContent =
      `上次同步: ${state.lastFnsSync ? formatTime(state.lastFnsSync) : '--'}`;

    updateStatusBadge('fnsStatus', 'fnsDot', !!state.lastFnsSync);
    updateStatusBadge('kbStatus', 'kbDot', !!state.lastKbSync);
  } catch (e) {
    console.error('Status load failed:', e);
  }
}

function updateStatusBadge(badgeId, dotId, connected) {
  const badge = document.getElementById(badgeId);
  const dot = document.getElementById(dotId);
  badge.className = badge.className.replace(/badge-(success|error|ghost)/g, '').trim();
  if (connected) {
    badge.classList.add('badge-success', 'text-white');
    dot.className = dot.className.replace(/bg-\S+/g, '').trim();
    dot.classList.add('bg-white', 'dot-glow-success');
  } else {
    badge.classList.add('badge-ghost', 'border', 'border-base-300');
    dot.className = dot.className.replace(/bg-\S+/g, '').trim();
    dot.classList.add('bg-base-content/30');
  }
}

function formatTime(ts) {
  if (!ts) return '--';
  const d = new Date(typeof ts === 'number' ? ts * 1000 : ts);
  if (isNaN(d.getTime())) return '--';
  const pad = n => String(n).padStart(2, '0');
  return `${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function formatSize(kb) {
  if (kb == null) return '--';
  if (kb < 1) return `${(kb * 1024).toFixed(0)} B`;
  if (kb < 1024) return `${kb.toFixed(1)} KB`;
  return `${(kb / 1024).toFixed(1)} MB`;
}

/* ===== Folders ===== */
async function loadFolders() {
  try {
    const tree = await api('api/folders');
    state.folderTree = tree;
    renderFolders();
  } catch (e) {
    console.error('Folders load failed:', e);
    toast('加载文件夹失败: ' + (e.message || 'unknown'), 'error');
  }
}

function _countFiles(node) {
  let count = (node.__files__ || []).length;
  for (const [k, v] of Object.entries(node)) {
    if (k !== '__files__') count += _countFiles(v);
  }
  return count;
}

function _renderTree(node, prefix, depth) {
  let html = '';
  for (const [name, child] of Object.entries(node)) {
    if (name === '__files__') continue;
    const fullPath = prefix ? `${prefix}/${name}` : name;
    const count = _countFiles(child);
    const isActive = state.currentFolder === fullPath;
    const hasChildren = Object.keys(child).some(k => k !== '__files__');
    const indent = depth * 16;
    html += `
      <li>
        <a onclick="selectFolder('${escapeAttr(fullPath)}')"
           class="relative flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm transition-all
                  ${isActive ? 'bg-primary/15 text-primary font-semibold' : 'hover:bg-base-200'}"
           style="padding-left:${12 + indent}px"
           title="${escapeAttr(fullPath)}">
          ${isActive ? '<div class="folder-active-indicator"></div>' : ''}
          <span class="text-base">${hasChildren ? '📁' : '📂'}</span>
          <span class="truncate flex-1">${escapeHtml(name)}</span>
          <span class="badge badge-xs ${isActive ? 'badge-primary text-white' : 'badge-ghost'}">${count}</span>
        </a>
      </li>`;
    if (hasChildren) {
      html += _renderTree(child, fullPath, depth + 1);
    }
  }
  return html;
}

function renderFolders() {
  const container = document.getElementById('folderList');
  const totalCount = state.folderTree ? _countFiles(state.folderTree) : state.folders.reduce((s, f) => s + (f.count || 0), 0);
  let html = `<ul class="menu menu-sm w-full p-0">
    <li>
      <a onclick="selectFolder(null)"
         class="relative flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm transition-all
                ${state.currentFolder === null ? 'bg-primary/15 text-primary font-semibold' : 'hover:bg-base-200'}">
        ${state.currentFolder === null ? '<div class="folder-active-indicator"></div>' : ''}
        <span class="text-base">📋</span>
        <span class="flex-1">全部</span>
        <span class="badge badge-xs ${state.currentFolder === null ? 'badge-primary text-white' : 'badge-ghost'}">${totalCount}</span>
      </a>
    </li>`;
  if (state.folderTree) {
    html += _renderTree(state.folderTree, '', 0);
  }
  html += '</ul>';
  container.innerHTML = html;
}

function selectFolder(path) {
  state.currentFolder = path;
  renderFolders();
  loadDocuments();
}

/* ===== Documents ===== */
async function loadDocuments() {
  try {
    const params = {};
    if (state.currentFolder) params.folder = state.currentFolder;
    const data = await api('api/documents', { params });
    state.documents = Array.isArray(data) ? data : (data.documents || []);
    renderDocuments();
  } catch (e) {
    console.error('Documents load failed:', e);
    toast('加载文档列表失败: ' + (e.message || 'unknown'), 'error');
  }
}

function getFilteredDocs() {
  let docs = [...state.documents];
  if (state.searchQuery) {
    const q = state.searchQuery.toLowerCase();
    docs = docs.filter(d => {
      const name = (d.path || '').split('/').pop();
      return name.toLowerCase().includes(q) || (d.path || '').toLowerCase().includes(q);
    });
  }
  const field = state.sortField;
  const asc = state.sortAsc ? 1 : -1;
  docs.sort((a, b) => {
    let va = field === 'name' ? (a.path || '').split('/').pop() : a[field];
    let vb = field === 'name' ? (b.path || '').split('/').pop() : b[field];
    if (field === 'name') return asc * String(va).localeCompare(String(vb));
    if (va == null) return 1;
    if (vb == null) return -1;
    return asc * (va - vb);
  });
  return docs;
}

function renderDocuments() {
  const docs = getFilteredDocs();
  const tbody = document.getElementById('docTableBody');
  const empty = document.getElementById('docListEmpty');
  const table = document.getElementById('docTable');

  document.querySelectorAll('th[data-sort]').forEach(th => {
    th.classList.remove('sort-asc', 'sort-desc');
    if (th.dataset.sort === state.sortField) th.classList.add(state.sortAsc ? 'sort-asc' : 'sort-desc');
  });

  if (docs.length === 0) {
    tbody.innerHTML = '';
    table.style.display = 'none';
    empty.style.display = '';
    return;
  }
  table.style.display = '';
  empty.style.display = 'none';

  tbody.innerHTML = docs.map(d => {
    const name = (d.path || '').split('/').pop();
    const statusClass = d.kb_doc_id ? 'bg-success dot-glow-success' : (d.sync_to_kb ? 'bg-primary' : 'bg-base-300');
    const isActive = state.currentDoc && state.currentDoc.path === d.path;
    return `<tr class="cursor-pointer transition-colors hover:bg-base-200 ${isActive ? 'bg-primary/10' : ''}"
               onclick="selectDoc('${escapeAttr(d.path)}')">
      <td class="text-center">
        <input type="checkbox" class="checkbox checkbox-xs checkbox-primary"
               ${d.sync_to_kb ? 'checked' : ''}
               onclick="event.stopPropagation(); toggleMeta('${escapeAttr(d.path)}', 'sync_to_kb', this.checked)">
      </td>
      <td class="text-center">
        <input type="checkbox" class="checkbox checkbox-xs checkbox-primary"
               ${d.pre_chunk !== false ? 'checked' : ''}
               onclick="event.stopPropagation(); toggleMeta('${escapeAttr(d.path)}', 'pre_chunk', this.checked)">
      </td>
      <td>
        <div class="flex items-center gap-2">
          <span class="w-2 h-2 rounded-full shrink-0 ${statusClass}"></span>
          <span class="truncate font-medium" title="${escapeAttr(d.path)}">${escapeHtml(name)}</span>
        </div>
      </td>
      <td class="text-base-content/60 text-xs tabular-nums whitespace-nowrap">${formatSize(d.size_kb)}</td>
      <td class="text-base-content/60 text-xs tabular-nums whitespace-nowrap">${formatTime(d.last_sync || d.staged_at)}</td>
    </tr>`;
  }).join('');
}

function sortBy(field) {
  if (state.sortField === field) { state.sortAsc = !state.sortAsc; }
  else { state.sortField = field; state.sortAsc = true; }
  renderDocuments();
}

function onSearch() {
  state.searchQuery = document.getElementById('searchInput').value.trim();
  renderDocuments();
}

/* ===== Metadata Toggle ===== */
async function toggleMeta(path, field, value) {
  try {
    const doc = state.documents.find(d => d.path === path);
    if (!doc) return;
    const body = { path };
    body.sync_to_kb = field === 'sync_to_kb' ? value : doc.sync_to_kb;
    body.pre_chunk = field === 'pre_chunk' ? value : (doc.pre_chunk !== false);
    await api('api/metadata', { method: 'POST', body: JSON.stringify(body) });
    doc.sync_to_kb = body.sync_to_kb;
    doc.pre_chunk = body.pre_chunk;
    renderDocuments();
    loadStatus();
    toast(`${field === 'sync_to_kb' ? '同步' : '预切块'}已${value ? '开启' : '关闭'}`, 'success');
  } catch (e) {
    toast('更新元数据失败: ' + e.message, 'error');
    loadDocuments();
  }
}

/* ===== Batch Operations ===== */
async function batchSetSync(val) {
  const docs = getFilteredDocs();
  const paths = docs.map(d => d.path);
  if (paths.length === 0) return;
  try {
    await api('api/metadata/batch', { method: 'POST', body: JSON.stringify({ paths, updates: { sync_to_kb: val } }) });
    docs.forEach(d => d.sync_to_kb = val);
    renderDocuments(); loadStatus();
    toast(`已批量${val ? '开启' : '关闭'}同步 (${paths.length} 篇)`, 'success');
  } catch (e) { toast('批量操作失败: ' + e.message, 'error'); }
}

async function batchSetChunk(val) {
  const docs = getFilteredDocs();
  const paths = docs.map(d => d.path);
  if (paths.length === 0) return;
  try {
    await api('api/metadata/batch', { method: 'POST', body: JSON.stringify({ paths, updates: { pre_chunk: val } }) });
    docs.forEach(d => d.pre_chunk = val);
    renderDocuments(); loadStatus();
    toast(`已批量${val ? '开启' : '关闭'}预切块 (${paths.length} 篇)`, 'success');
  } catch (e) { toast('批量操作失败: ' + e.message, 'error'); }
}

async function batchClear() {
  const docs = getFilteredDocs();
  const paths = docs.map(d => d.path);
  if (paths.length === 0) return;
  try {
    await api('api/metadata/batch', { method: 'POST', body: JSON.stringify({ paths, updates: { sync_to_kb: false, pre_chunk: false } }) });
    docs.forEach(d => { d.sync_to_kb = false; d.pre_chunk = false; });
    renderDocuments(); loadStatus();
    toast(`已取消全部选择 (${paths.length} 篇)`, 'success');
  } catch (e) { toast('批量操作失败: ' + e.message, 'error'); }
}

/* ===== Document Viewer ===== */
async function selectDoc(path) {
  if (state.editing) {
    if (!confirm('当前正在编辑，是否放弃修改？')) return;
    state.editing = false;
  }
  const doc = state.documents.find(d => d.path === path);
  if (!doc) return;
  state.currentDoc = doc;
  renderDocuments();

  const name = (doc.path || '').split('/').pop();
  document.getElementById('viewerTitle').innerHTML = `<span>📄</span> ${escapeHtml(name)}`;
  document.getElementById('viewerActions').style.display = '';

  const content = document.getElementById('viewerContent');
  content.innerHTML = '<div class="flex items-center justify-center h-full"><span class="loading loading-spinner loading-lg text-primary"></span></div>';

  try {
    const data = await api('api/document', { params: { path: path } });
    state.originalContent = data.content || '';
    renderMarkdown(state.originalContent);
  } catch (e) {
    content.innerHTML = `<div class="flex flex-col items-center justify-center h-full gap-3 text-base-content/40">
      <span class="text-5xl">❌</span>
      <span class="text-sm">加载失败: ${escapeHtml(e.message)}</span>
    </div>`;
  }
}

function renderMarkdown(text) {
  const content = document.getElementById('viewerContent');
  content.innerHTML = `<div class="md-render">${mdToHtml(text)}</div>`;
  postRenderLinks();
}

/* ===== Markdown Renderer ===== */
function mdToHtml(md) {
  if (!md) return '';
  let html = escapeHtml(md);
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => `<pre><code class="lang-${lang}">${code}</code></pre>`);
  html = html.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  html = html.replace(/^---+$/gm, '<hr>');
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a data-href="$2" target="_blank" rel="noopener" class="md-link">$1</a>');
  html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<span class="md-img cursor-pointer text-primary underline" data-url="$2">[image: $1]</span>');
  html = html.replace(/^[\-\*] (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  html = html.replace(/\n\n+/g, '</p><p>');
  html = html.replace(/\n/g, '<br>');
  if (!html.startsWith('<')) html = '<p>' + html + '</p>';
  html = html.replace(/<p>\s*<\/p>/g, '');
  return html;
}

function postRenderLinks() {
  document.querySelectorAll('.md-link[data-href]').forEach(el => {
    el.setAttribute('href', el.getAttribute('data-href'));
    el.removeAttribute('data-href');
  });
  document.querySelectorAll('.md-img[data-url]').forEach(el => {
    const url = el.getAttribute('data-url');
    const alt = el.textContent.replace(/\[image: |\]/g, '');
    const img = document.createElement('img');
    img.src = url;
    img.alt = alt;
    img.className = 'max-w-full rounded-xl shadow-md my-3';
    el.replaceWith(img);
  });
}

/* ===== Edit Mode ===== */
function toggleEdit() {
  state.editing = true;
  const content = document.getElementById('viewerContent');
  content.innerHTML = `<textarea class="editor-textarea" id="editorArea">${escapeHtml(state.originalContent)}</textarea>`;
  document.getElementById('btnEdit').style.display = 'none';
  document.getElementById('btnSave').style.display = '';
  document.getElementById('btnCancel').style.display = '';
}

function cancelEdit() {
  state.editing = false;
  renderMarkdown(state.originalContent);
  document.getElementById('btnEdit').style.display = '';
  document.getElementById('btnSave').style.display = 'none';
  document.getElementById('btnCancel').style.display = 'none';
}

async function saveDoc() {
  const textarea = document.getElementById('editorArea');
  if (!textarea) return;
  const newContent = textarea.value;
  try {
    await api('api/document', { method: 'POST', body: JSON.stringify({ path: state.currentDoc.path, content: newContent }) });
    state.originalContent = newContent;
    state.editing = false;
    renderMarkdown(newContent);
    document.getElementById('btnEdit').style.display = '';
    document.getElementById('btnSave').style.display = 'none';
    document.getElementById('btnCancel').style.display = 'none';
    toast('文档已保存', 'success');
  } catch (e) {
    toast('保存失败: ' + e.message, 'error');
  }
}

/* ===== Sync Operations ===== */
async function syncFns() {
  const btn = document.getElementById('btnSyncFns');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading loading-spinner loading-xs"></span> 同步中...';
  try {
    const data = await api('api/sync/fns', { method: 'POST' });
    if (data.error) { toast('FNS 同步失败: ' + data.error, 'error'); return; }
    state.lastFnsSync = Date.now() / 1000;
    toast(`FNS 同步完成: 新增 ${data.new || 0}, 更新 ${data.updated || 0}, 未变 ${data.unchanged || 0}`, 'success');
    await Promise.all([loadFolders(), loadDocuments(), loadStatus()]);
  } catch (e) {
    toast('FNS 同步失败: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '📥 从 FNS 同步';
  }
}

async function syncKb() {
  const btn = document.getElementById('btnSyncKb');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading loading-spinner loading-xs"></span> 同步中...';
  try {
    const data = await api('api/sync/kb', { method: 'POST' });
    if (data.error) { toast('知识库同步失败: ' + data.error, 'error'); return; }
    state.lastKbSync = Date.now() / 1000;
    toast(`知识库同步完成: 新增 ${data.new || 0}, 更新 ${data.updated || 0}${data.errors ? `, 失败 ${data.errors} 篇` : ''}`, data.errors ? 'warning' : 'success');
    await loadStatus();
    await loadDocuments();
  } catch (e) {
    toast('知识库同步失败: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '📤 同步到知识库';
  }
}

/* ===== Utilities ===== */
function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function escapeAttr(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

/* ===== Init ===== */
async function init() {
  if (isBridge()) {
    try {
      await Promise.race([
        bridge.ready(),
        new Promise((_, reject) => setTimeout(() => reject(new Error('bridge ready timeout')), 3000))
      ]);
    } catch (e) {
      console.warn('bridge.ready():', e.message);
    }
  }

  initTheme();

  if (isBridge()) {
    bridge.onContext((ctx) => {
      if (ctx && ctx.isDark !== undefined) {
        document.documentElement.setAttribute('data-theme', ctx.isDark ? 'dark' : 'light');
        document.getElementById('themeToggle').checked = ctx.isDark;
      }
    });
  }

  await Promise.all([loadFolders(), loadDocuments(), loadStatus()]);
  setInterval(loadStatus, 30000);
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveDoc(); }
});

init().catch(e => {
  console.error('Init failed:', e);
  toast('初始化失败: ' + e.message, 'error');
});

window.onerror = function(msg, url, line, col, error) {
  console.error('Global error:', msg, url, line, col, error);
  toast(`JS Error: ${msg} (line ${line})`, 'error');
};
window.addEventListener('unhandledrejection', function(e) {
  console.error('Unhandled rejection:', e.reason);
  toast('Promise Error: ' + (e.reason?.message || e.reason || 'unknown'), 'error');
});
</script>
