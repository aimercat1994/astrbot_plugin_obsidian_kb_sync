<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obsidian 暂存区</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css"/>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github.min.css" id="hljs-light">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark.min.css" id="hljs-dark" disabled>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
<!-- KaTeX 数学公式 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
<!-- Mermaid 图表 -->
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<style>
html, body { height: 100%; overflow: hidden; margin: 0; }
body {
  display: flex; flex-direction: column;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background: var(--color-base-100); color: var(--color-base-content);
}

/* ===== Top Bar ===== */
.topbar {
  display: flex; align-items: center; gap: 14px;
  padding: 0 20px; height: 52px; flex-shrink: 0;
  background: var(--color-base-100);
  border-bottom: 1px solid var(--color-base-300);
  position: relative;
}
.topbar::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--color-primary), var(--color-secondary), var(--color-accent));
  opacity: 0.6;
}
.topbar-title {
  font-size: 1.1rem; font-weight: 700;
  background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  display: flex; align-items: center; gap: 8px; white-space: nowrap;
}
.topbar-title .icon { -webkit-text-fill-color: initial; }
.topbar-spacer { flex: 1; }
.topbar-actions { display: flex; gap: 8px; align-items: center; }

/* Status badges */
.status-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 20px;
  font-size: 0.73rem; font-weight: 500;
  border: 1px solid var(--color-base-300); transition: all 0.2s;
}
.status-badge.connected {
  border-color: var(--color-success);
  background: color-mix(in srgb, var(--color-success) 10%, transparent);
  color: var(--color-success);
}
.status-badge.disconnected { opacity: 0.5; }
.status-badge .dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--color-base-300); transition: all 0.2s;
}
.status-badge.connected .dot {
  background: var(--color-success); box-shadow: 0 0 6px var(--color-success);
}

/* ===== App Shell ===== */
.app-shell { display: flex; flex: 1; min-height: 0; overflow: hidden; }

/* ===== Sidebar ===== */
.sidebar {
  width: 300px; min-width: 240px; max-width: 420px;
  display: flex; flex-direction: column;
  background: var(--color-base-100);
  border-right: 1px solid var(--color-base-300);
  overflow: hidden; flex-shrink: 0;
}
.sidebar-header {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px; font-size: 0.78rem; font-weight: 600;
  color: var(--color-base-content); opacity: 0.6;
  text-transform: uppercase; letter-spacing: 0.5px;
  border-bottom: 1px solid var(--color-base-300);
  flex-shrink: 0;
}
.sidebar-header .count { margin-left: auto; font-size: 0.7rem; opacity: 0.6; }

/* Search */
.sidebar-search {
  padding: 8px 10px; border-bottom: 1px solid var(--color-base-300); flex-shrink: 0;
}
.sidebar-search-wrap { position: relative; }
.sidebar-search-wrap::before {
  content: '🔍'; position: absolute; left: 9px; top: 50%;
  transform: translateY(-50%); font-size: 0.72rem; pointer-events: none;
}
.sidebar-search input {
  width: 100%; padding: 5px 10px 5px 28px;
  font-size: 0.8rem; border-radius: 20px;
  border: 1px solid var(--color-base-300);
  background: var(--color-base-200); color: var(--color-base-content);
  outline: none; transition: border-color 0.2s;
}
.sidebar-search input:focus { border-color: var(--color-primary); }

/* Tree body */
.sidebar-tree {
  flex: 1; overflow-y: auto; padding: 4px 0;
}

/* ===== Unified Tree ===== */
.tree-list { list-style: none; margin: 0; padding: 0; }
.tree-list ul { list-style: none; margin: 0; padding: 0; }

/* Folder row */
.tree-folder {
  display: flex; align-items: center; gap: 4px;
  padding: 4px 8px; cursor: pointer; font-size: 0.82rem;
  border-radius: 5px; margin: 0 4px;
  transition: background 0.12s; position: relative;
}
.tree-folder:hover { background: var(--color-base-200); }
.tree-folder.active {
  background: color-mix(in srgb, var(--color-primary) 12%, transparent);
  color: var(--color-primary); font-weight: 600;
}
.tree-folder .chevron {
  width: 16px; height: 16px; display: flex; align-items: center; justify-content: center;
  font-size: 0.6rem; opacity: 0.35; flex-shrink: 0;
  transition: transform 0.2s;
}
.tree-folder .chevron.open { transform: rotate(90deg); }
.tree-folder .chevron.leaf { visibility: hidden; }
.tree-folder .icon { font-size: 0.85rem; flex-shrink: 0; }
.tree-folder .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tree-folder .badge {
  font-size: 0.65rem; opacity: 0.4;
  background: var(--color-base-300); color: var(--color-base-content);
  padding: 0 5px; border-radius: 8px; line-height: 1.6;
  flex-shrink: 0;
}
.tree-folder.active .badge {
  background: var(--color-primary); color: var(--color-primary-content); opacity: 1;
}

/* File row */
.tree-file {
  display: flex; align-items: center; gap: 6px;
  padding: 3px 8px 3px 0; cursor: pointer; font-size: 0.8rem;
  border-radius: 5px; margin: 0 4px;
  transition: background 0.12s; color: var(--color-base-content);
}
.tree-file:hover { background: var(--color-base-200); }
.tree-file.active {
  background: color-mix(in srgb, var(--color-primary) 10%, transparent);
  font-weight: 600;
}
.tree-file .dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.tree-file .dot.synced { background: var(--color-success); box-shadow: 0 0 4px var(--color-success); }
.tree-file .dot.selected { background: var(--color-primary); }
.tree-file .dot.none { background: var(--color-base-300); }
.tree-file .name {
  flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.tree-file .size {
  font-size: 0.68rem; opacity: 0.35; white-space: nowrap; flex-shrink: 0;
}

/* Children container with collapse animation */
.tree-children.collapsed { display: none; }

/* Toggle labels */
.toggle-label {
  display: flex; align-items: center; gap: 5px;
  font-size: 0.75rem; cursor: pointer; white-space: nowrap;
}
.toggle-label .toggle-text { opacity: 0.7; }
.toggle-label:has(input:checked) .toggle-text { opacity: 1; font-weight: 500; }

/* ===== Main Content ===== */
.main-content {
  flex: 1; display: flex; flex-direction: column;
  overflow: hidden; min-width: 0;
  background: var(--color-base-100);
}

/* Viewer */
.viewer-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 20px; flex-shrink: 0;
  border-bottom: 1px solid var(--color-base-300);
}
.viewer-title {
  font-size: 0.95rem; font-weight: 600;
  display: flex; align-items: center; gap: 6px;
}
.viewer-actions { display: flex; gap: 6px; }
.viewer-body { flex: 1; overflow-y: auto; padding: 20px 24px; }

/* Markdown Render - Enhanced */
.md-render {
  font-size: 0.9rem; line-height: 1.8; color: var(--color-base-content);
  word-wrap: break-word; overflow-wrap: break-word;
}
.md-render h1 { font-size: 1.6rem; font-weight: 700; margin: 1.5rem 0 0.6rem; padding-bottom: 0.3rem; border-bottom: 2px solid color-mix(in srgb, var(--color-primary) 15%, transparent); }
.md-render h2 { font-size: 1.35rem; font-weight: 700; margin: 1.3rem 0 0.5rem; padding-bottom: 0.25rem; border-bottom: 1px solid color-mix(in srgb, var(--color-primary) 10%, transparent); }
.md-render h3 { font-size: 1.15rem; font-weight: 600; margin: 1rem 0 0.4rem; }
.md-render h4 { font-size: 1rem; font-weight: 600; margin: 0.8rem 0 0.3rem; }
.md-render h5, .md-render h6 { font-size: 0.9rem; font-weight: 600; margin: 0.6rem 0 0.2rem; color: var(--color-base-content); opacity: 0.8; }
.md-render h1, .md-render h2, .md-render h3, .md-render h4, .md-render h5, .md-render h6 {
  scroll-margin-top: 16px; /* TOC 跳转偏移 */
}
.md-render p { margin: 0.5rem 0; }
.md-render pre {
  background: var(--color-base-200); padding: 14px 16px;
  border-radius: 10px; overflow-x: auto; font-size: 0.82rem;
  border: 1px solid var(--color-base-300); position: relative;
}
.md-render pre code { background: none; padding: 0; border-radius: 0; color: inherit; }
.md-render code { font-size: 0.85em; font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace; }
.md-render :not(pre) > code {
  background: color-mix(in srgb, var(--color-primary) 10%, transparent);
  color: var(--color-primary); padding: 2px 6px; border-radius: 4px;
  font-size: 0.85em;
}
.md-render blockquote {
  border-left: 4px solid var(--color-primary);
  padding: 10px 16px; margin: 0.8rem 0;
  background: color-mix(in srgb, var(--color-primary) 5%, transparent);
  border-radius: 0 8px 8px 0; color: var(--color-base-content); opacity: 0.9;
}
.md-render blockquote p { margin: 0.2rem 0; }
.md-render img { max-width: 100%; border-radius: 10px; margin: 0.5rem 0; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.md-render ul, .md-render ol { padding-left: 1.8rem; margin: 0.5rem 0; }
.md-render li { margin-bottom: 0.3rem; }
.md-render li > ul, .md-render li > ol { margin: 0.2rem 0; }
.md-render hr { border: none; border-top: 2px solid color-mix(in srgb, var(--color-primary) 10%, transparent); margin: 1.5rem 0; }
.md-render a { color: var(--color-primary); text-decoration: underline; text-decoration-color: color-mix(in srgb, var(--color-primary) 30%, transparent); text-underline-offset: 3px; }
.md-render a:hover { text-decoration-color: var(--color-primary); }
.md-render table { width: 100%; border-collapse: collapse; margin: 0.8rem 0; font-size: 0.85rem; }
.md-render th, .md-render td { padding: 8px 12px; border: 1px solid var(--color-base-300); }
.md-render th { background: color-mix(in srgb, var(--color-primary) 8%, transparent); font-weight: 600; text-align: left; }
.md-render tr:hover { background: color-mix(in srgb, var(--color-primary) 3%, transparent); }
.md-render .task-list-item { list-style: none; margin-left: -1.5rem; }
.md-render .task-list-item input { margin-right: 0.5rem; accent-color: var(--color-primary); }
.md-render del { opacity: 0.5; text-decoration: line-through; }
.md-render mark { background: color-mix(in srgb, var(--color-warning) 30%, transparent); padding: 1px 4px; border-radius: 3px; }

/* 代码块增强 */
.code-block-wrapper {
  position: relative; margin: 0.8rem 0;
}
.code-block-wrapper pre {
  margin: 0; padding-top: 36px;
}
.code-block-wrapper pre,
.code-block-wrapper pre code,
.code-block-wrapper pre code * {
  line-height: 1.6 !important;
  font-size: 12px !important;
}
.code-block-wrapper .code-line-numbers {
  font-size: 12px;
}
.code-block-wrapper .code-line-numbers span {
  line-height: 1.6;
  user-select: none;
}
.code-block-header {
  position: absolute; top: 0; left: 0; right: 0; z-index: 2;
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 12px; font-size: 0.72rem;
  background: color-mix(in srgb, var(--color-base-300) 50%, transparent);
  border-radius: 10px 10px 0 0;
  border-bottom: 1px solid var(--color-base-300);
}
.code-lang { color: var(--color-base-content); opacity: 0.5; font-weight: 600; }
.code-copy-btn {
  display: flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 4px; cursor: pointer;
  color: var(--color-base-content); opacity: 0.5;
  background: transparent; border: none; font-size: 0.72rem;
  transition: all 0.2s;
}
.code-copy-btn:hover { opacity: 1; background: color-mix(in srgb, var(--color-primary) 15%, transparent); }
.code-copy-btn.copied { color: var(--color-success); opacity: 1; }

/* 行号 */
.code-lines {
  display: flex;
}
.code-line-numbers {
  flex-shrink: 0; padding: 36px 0 14px 0; text-align: right;
  color: var(--color-base-content); opacity: 0.25;
  font-size: 0.75rem; line-height: 1.6;
  border-right: 1px solid var(--color-base-300);
  margin-right: 12px; padding-right: 10px;
  min-width: 2.5rem;
  display: flex; flex-direction: column; white-space: pre;
}
.code-line-numbers span {
  display: block;
}
.code-content { flex: 1; overflow-x: auto; }

/* Lightbox */
.lightbox-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(0,0,0,0.85); display: none;
  align-items: center; justify-content: center;
  cursor: zoom-out; padding: 40px;
}
.lightbox-overlay.active { display: flex; }
.lightbox-overlay img {
  max-width: 95vw; max-height: 90vh; border-radius: 8px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.lightbox-close {
  position: absolute; top: 16px; right: 20px;
  background: rgba(255,255,255,0.15); border: none;
  color: white; font-size: 1.5rem; cursor: pointer;
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.lightbox-close:hover { background: rgba(255,255,255,0.3); }

/* Callout 块 */
.md-render .callout {
  border-left: 4px solid var(--color-primary);
  padding: 12px 16px; margin: 0.8rem 0;
  border-radius: 0 8px 8px 0;
  background: color-mix(in srgb, var(--color-primary) 5%, transparent);
}
.md-render .callout-title {
  display: flex; align-items: center; gap: 6px;
  font-weight: 600; margin-bottom: 6px; font-size: 0.9rem;
}
.md-render .callout-body { font-size: 0.88rem; }
.md-render .callout-type-info { border-left-color: var(--color-info); }
.md-render .callout-type-warning { border-left-color: var(--color-warning); }
.md-render .callout-type-tip { border-left-color: var(--color-success); }
.md-render .callout-type-danger { border-left-color: var(--color-error); }

/* Wikilink */
.md-render .wikilink {
  color: var(--color-primary); cursor: pointer;
  text-decoration: none; border-bottom: 1px dashed color-mix(in srgb, var(--color-primary) 40%, transparent);
}
.md-render .wikilink:hover { border-bottom-color: var(--color-primary); }

/* 嵌入元素 */
.md-render .embed-image {
  margin: 1rem 0; text-align: center;
}
.md-render .embed-image img {
  max-width: 100%; border-radius: 8px; cursor: zoom-in;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  transition: transform 0.2s;
}
.md-render .embed-image img:hover {
  transform: scale(1.02);
}

.md-render .embed-doc {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; margin: 0.8rem 0;
  background: color-mix(in srgb, var(--color-primary) 5%, transparent);
  border: 1px solid color-mix(in srgb, var(--color-primary) 20%, transparent);
  border-radius: 8px; cursor: pointer;
  transition: all 0.2s;
}
.md-render .embed-doc:hover {
  background: color-mix(in srgb, var(--color-primary) 10%, transparent);
  border-color: var(--color-primary);
  box-shadow: 0 2px 8px color-mix(in srgb, var(--color-primary) 15%, transparent);
}
.md-render .embed-doc-icon {
  font-size: 1.5rem; flex-shrink: 0;
}
.md-render .embed-doc-content {
  flex: 1; min-width: 0;
}
.md-render .embed-doc-title {
  font-weight: 600; color: var(--color-primary);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.md-render .embed-doc-hint {
  font-size: 0.75rem; opacity: 0.5; margin-top: 2px;
}

/* TOC */
.toc-panel {
  width: 220px; flex-shrink: 0; overflow-y: auto; padding: 12px 14px;
  border-left: 1px solid var(--color-base-300); background: var(--color-base-100);
  font-size: 0.78rem; display: none;
}
.toc-panel.visible { display: block; }
.toc-title { font-size: 0.75rem; font-weight: 700; color: var(--color-base-content); opacity: 0.5; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
.toc-list { list-style: none; padding: 0; margin: 0; }
.toc-list li { margin-bottom: 2px; }
.toc-list a {
  display: block; padding: 3px 8px; border-radius: 4px; color: var(--color-base-content);
  text-decoration: none; opacity: 0.65; transition: all 0.15s; cursor: pointer;
  border-left: 2px solid transparent; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.toc-list a:hover { opacity: 1; background: color-mix(in srgb, var(--color-primary) 8%, transparent); }
.toc-list a.active { opacity: 1; color: var(--color-primary); font-weight: 600; border-left-color: var(--color-primary); background: color-mix(in srgb, var(--color-primary) 8%, transparent); }
.toc-list .toc-h1 { padding-left: 8px; font-weight: 600; }
.toc-list .toc-h2 { padding-left: 18px; }
.toc-list .toc-h3 { padding-left: 28px; font-size: 0.75rem; }
.toc-list .toc-h4, .toc-list .toc-h5, .toc-list .toc-h6 { padding-left: 38px; font-size: 0.73rem; opacity: 0.5; }

/* Search Highlight Bar */
.search-highlight-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 12px; background: var(--color-base-200);
  border-bottom: 1px solid var(--color-base-300);
}
.search-highlight-bar input {
  flex: 1; padding: 4px 8px; border: 1px solid var(--color-base-300);
  border-radius: 4px; font-size: 0.8rem; background: var(--color-base-100);
  color: var(--color-base-content); outline: none;
}
.search-highlight-bar input:focus {
  border-color: var(--color-primary);
}
.search-highlight-count {
  font-size: 0.75rem; opacity: 0.6; min-width: 60px; text-align: center;
}

/* Search Highlight in Content */
.search-highlight {
  background: color-mix(in srgb, var(--color-warning) 40%, transparent);
  padding: 1px 2px; border-radius: 2px;
}
.search-highlight-active {
  background: color-mix(in srgb, var(--color-primary) 50%, transparent);
  outline: 2px solid var(--color-primary);
}

/* Editor */
.editor-textarea {
  width: 100%; height: 100%; resize: none; border: none; outline: none;
  background: var(--color-base-100); color: var(--color-base-content);
  padding: 16px 20px; font-size: 0.85rem; line-height: 1.7;
  font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
  tab-size: 2;
}

/* Empty states */
.empty-state {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px; opacity: 0.35;
}

/* ===== Bottom Bar ===== */
.bottombar {
  display: flex; align-items: center; gap: 10px;
  padding: 0 20px; height: 30px; flex-shrink: 0;
  background: var(--color-base-100);
  border-top: 1px solid var(--color-base-300);
  font-size: 0.74rem; opacity: 0.5;
}
.bottombar .sep { opacity: 0.25; }
.bottombar .hl { color: var(--color-primary); font-weight: 600; opacity: 1; }

/* ===== Toast ===== */
.toast-wrap {
  position: fixed; top: 60px; right: 16px; z-index: 9999;
  display: flex; flex-direction: column; gap: 8px; pointer-events: none;
}
.toast-item {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px; border-radius: 10px;
  font-size: 0.84rem; color: #fff;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  pointer-events: auto;
  backdrop-filter: blur(8px); max-width: 380px;
  opacity: 1;
}
.toast-item.info { background: linear-gradient(135deg, #6366f1, #818cf8); }
.toast-item.success { background: linear-gradient(135deg, #16a34a, #22c55e); }
.toast-item.error { background: linear-gradient(135deg, #dc2626, #ef4444); }
.toast-item.warning { background: linear-gradient(135deg, #d97706, #f59e0b); }
.toast-item.fade-out { opacity: 0; transition: opacity 0.3s; }

/* ===== Sync Progress ===== */
.sync-progress {
  display: none; align-items: center; gap: 10px;
  padding: 6px 20px; background: var(--color-base-200);
  border-bottom: 1px solid var(--color-base-300);
  font-size: 0.8rem; flex-shrink: 0;
}
.sync-progress.active { display: flex; }
.sync-progress-label { white-space: nowrap; min-width: 120px; font-weight: 600; }
.sync-progress-bar { flex: 1; height: 6px; background: var(--color-base-300); border-radius: 3px; overflow: hidden; position: relative; }
.sync-progress-fill { height: 100%; background: linear-gradient(90deg, #6366f1, #22c55e); border-radius: 3px; transition: width 0.3s; width: 0; }
.sync-progress-text { white-space: nowrap; opacity: 0.7; min-width: 100px; text-align: right; }

<!-- Bridge SDK -->
<script src="/api/plugin/page/bridge-sdk.js"></script>

<script>
/* ===== State ===== */
let state = {
  folderTree: null,
  documents: [],
  currentDoc: null,
  editing: false,
  originalContent: '',
  searchQuery: '',
  lastFnsSync: null,
  lastKbSync: null,
  expandedFolders: new Set(),
  docMap: {},  // path -> doc object
};

/* ===== Bridge / API ===== */
const bridge = window.AstrBotPluginPage;
function isBridge() { return bridge && typeof bridge.apiGet === 'function'; }

async function api(path, opts = {}) {
  const method = (opts.method || 'GET').toUpperCase();
  if (isBridge()) {
    const endpoint = path.replace(/^\//, '');
    try {
      if (method === 'GET') return await bridge.apiGet(endpoint, opts.params || {});
      const body = opts.body ? (typeof opts.body === 'string' ? JSON.parse(opts.body) : opts.body) : {};
      return await bridge.apiPost(endpoint, body);
    } catch (e) { throw new Error(e.message || 'Bridge API error'); }
  } else {
    let url = path;
    if (opts.params && Object.keys(opts.params).length > 0) {
      const qs = Object.entries(opts.params).map(([k,v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`).join('&');
      url += (url.includes('?') ? '&' : '?') + qs;
    }
    const fetchOpts = { headers: {'Content-Type': 'application/json'} };
    if (opts.method) fetchOpts.method = opts.method;
    if (opts.body) fetchOpts.body = opts.body;
    const res = await fetch(url, fetchOpts);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }
}

/* ===== Theme ===== */
function initTheme() {
  let isDark = false;
  if (isBridge()) { const ctx = bridge.getContext(); if (ctx && ctx.isDark !== undefined) isDark = ctx.isDark; }
  else { try { isDark = localStorage.getItem('staging-theme') === 'dark'; } catch (e) {} }
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('themeToggle').checked = isDark;
  // Switch highlight.js theme
  document.getElementById('hljs-light').disabled = isDark;
  document.getElementById('hljs-dark').disabled = !isDark;
}
function toggleTheme() {
  const isDark = document.getElementById('themeToggle').checked;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  // Switch highlight.js theme
  document.getElementById('hljs-light').disabled = isDark;
  document.getElementById('hljs-dark').disabled = !isDark;
  try { localStorage.setItem('staging-theme', isDark ? 'dark' : 'light'); } catch (e) {}
}

/* ===== Toast ===== */
function toast(msg, type = 'info') {
  const c = document.getElementById('toastContainer');
  const icons = { info: 'ℹ️', success: '✅', error: '❌', warning: '⚠️' };
  const el = document.createElement('div');
  el.className = `toast-item ${type}`;
  el.innerHTML = `<span>${icons[type]||''}</span><span>${esc(msg)}</span>`;
  c.appendChild(el);
  setTimeout(() => { el.classList.add('fade-out'); setTimeout(() => el.remove(), 300); }, 3500);
}

/* ===== Status ===== */
async function loadStatus() {
  try {
    const s = await api('api/status');
    document.getElementById('statTotal').textContent = s.total_documents ?? 0;
    document.getElementById('statSelected').textContent = s.selected_for_sync ?? 0;
    document.getElementById('statSynced').textContent = s.synced_to_kb ?? 0;
    document.getElementById('statLastSync').textContent = `上次同步: ${state.lastFnsSync ? fmtTime(state.lastFnsSync) : '--'}`;
    updateBadge('fnsStatus', !!state.lastFnsSync);
    updateBadge('kbStatus', !!state.lastKbSync);
  } catch (e) { console.error('Status:', e); }
}
function updateBadge(id, ok) {
  document.getElementById(id).className = 'status-badge ' + (ok ? 'connected' : 'disconnected');
}
function fmtTime(ts) {
  if (!ts) return '--';
  const d = new Date(typeof ts === 'number' ? ts * 1000 : ts);
  if (isNaN(d)) return '--';
  const p = n => String(n).padStart(2,'0');
  return `${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}
function fmtSize(kb) {
  if (kb == null) return '';
  if (kb < 1) return `${(kb*1024).toFixed(0)}B`;
  if (kb < 1024) return `${kb.toFixed(1)}K`;
  return `${(kb/1024).toFixed(1)}M`;
}

/* ===== Data Loading ===== */
async function loadFolders() {
  try {
    state.folderTree = await api('api/folders');
    // 默认全部收起，不自动展开
  } catch (e) { console.error('Folders:', e); toast('加载文件夹失败', 'error'); }
}

async function loadDocuments() {
  try {
    const data = await api('api/documents', { params: {} });
    state.documents = Array.isArray(data) ? data : (data.documents || []);
    state.docMap = {};
    state.documents.forEach(d => { state.docMap[d.path] = d; });
  } catch (e) { console.error('Docs:', e); toast('加载文档失败', 'error'); }
}

/* ===== Unified Tree Rendering ===== */
function countFiles(node) {
  let n = (node.__files__ || []).length;
  for (const [k, v] of Object.entries(node)) { if (k !== '__files__') n += countFiles(v); }
  return n;
}

function _getFilesInNode(node) {
  return (node.__files__ || []).map(item => {
    const p = typeof item === 'string' ? item : item.path;
    return p ? state.docMap[p] : null;
  }).filter(Boolean);
}

function _buildTree(node, prefix, depth) {
  let html = '';
  const indent = depth * 16;
  const q = state.searchQuery.toLowerCase();

  const folders = [];
  for (const [name, child] of Object.entries(node)) {
    if (name !== '__files__') folders.push([name, child]);
  }

  for (const [name, child] of folders) {
    const fullPath = prefix ? `${prefix}/${name}` : name;
    const fileCount = countFiles(child);
    const hasSubfolders = Object.keys(child).some(k => k !== '__files__');
    const isExpanded = state.expandedFolders.has(fullPath);
    const hasFiles = (child.__files__ || []).length > 0;

    // Folder row
    html += `<li>
      <div class="tree-folder" style="padding-left:${8 + indent}px"
           onclick="toggleFolder('${esc(fullPath)}')">
        <span class="chevron ${isExpanded ? 'open' : ''}">▶</span>
        <span class="icon">${isExpanded ? '📂' : '📁'}</span>
        <span class="name" title="${esc(fullPath)}">${esc(name)}</span>
        <span class="badge">${fileCount}</span>
      </div>`;

    // Children container: files + subfolders
    html += `<ul class="tree-children ${isExpanded ? '' : 'collapsed'}" data-folder="${esc(fullPath)}">`;

      // Files first
      if (hasFiles) {
        const files = _getFilesInNode(child);
        const filtered = q ? files.filter(d => (d.path||'').toLowerCase().includes(q)) : files;
        filtered.forEach(d => {
          const docName = (d.path || '').split('/').pop();
          const dotClass = d.kb_doc_id ? 'synced' : (d.sync_to_kb ? 'selected' : 'none');
          const isActive = state.currentDoc && state.currentDoc.path === d.path;
          html += `<li>
            <div class="tree-file ${isActive ? 'active' : ''}" style="padding-left:${8 + (depth+1)*16}px"
                 onclick="selectDoc('${esc(d.path)}')">
              <span class="dot ${dotClass}"></span>
              <span class="name" title="${esc(d.path)}">${esc(docName)}</span>
              <span class="size">${fmtSize(d.size_kb)}</span>
            </div>
          </li>`;
        });
      }

      // Then subfolders (recursive)
      if (hasSubfolders) {
        html += _buildTree(child, fullPath, depth + 1);
      }

      html += '</ul>';

    html += '</li>';
  }

  // Root-level files
  if (depth === 0 && node.__files__ && node.__files__.length > 0) {
    const files = _getFilesInNode(node);
    const filtered = q ? files.filter(d => (d.path||'').toLowerCase().includes(q)) : files;
    filtered.forEach(d => {
      const docName = (d.path || '').split('/').pop();
      const dotClass = d.kb_doc_id ? 'synced' : (d.sync_to_kb ? 'selected' : 'none');
      const isActive = state.currentDoc && state.currentDoc.path === d.path;
      html += `<li>
        <div class="tree-file ${isActive ? 'active' : ''}" style="padding-left:${8}px"
             onclick="selectDoc('${esc(d.path)}')">
          <span class="dot ${dotClass}"></span>
          <span class="name" title="${esc(d.path)}">${esc(docName)}</span>
          <span class="size">${fmtSize(d.size_kb)}</span>
        </div>
      </li>`;
    });
  }

  return html;
}

function renderTree() {
  const root = document.getElementById('treeRoot');
  const totalCount = state.folderTree ? countFiles(state.folderTree) : state.documents.length;
  document.getElementById('totalCount').textContent = totalCount + ' 篇';

  if (!state.folderTree || totalCount === 0) {
    root.innerHTML = '<li style="padding:20px;text-align:center;opacity:0.35;font-size:0.82rem;">暂无文档</li>';
    return;
  }

  root.innerHTML = _buildTree(state.folderTree, '', 0);
}

function toggleFolder(path) {
  if (state.expandedFolders.has(path)) state.expandedFolders.delete(path);
  else state.expandedFolders.add(path);
  renderTree();
}

function onSearch() {
  state.searchQuery = document.getElementById('searchInput').value.trim();
  renderTree();
}

/* ===== Doc Toggle ===== */
async function onDocToggle(field, value) {
  if (!state.currentDoc) return;
  const doc = state.currentDoc;
  const body = { path: doc.path };
  body.sync_to_kb = field === 'sync_to_kb' ? value : !!doc.sync_to_kb;
  body.pre_chunk = field === 'pre_chunk' ? value : (doc.pre_chunk !== false);
  try {
    await api('api/metadata', { method: 'POST', body: JSON.stringify(body) });
    doc.sync_to_kb = body.sync_to_kb;
    doc.pre_chunk = body.pre_chunk;
    renderTree();
    loadStatus();
    toast(`${field === 'sync_to_kb' ? '同步' : '预切块'}已${value ? '开启' : '关闭'}`, 'success');
  } catch (e) {
    toast('更新失败: ' + e.message, 'error');
    // Revert toggle
    document.getElementById(field === 'sync_to_kb' ? 'toggleSync' : 'toggleChunk').checked = !value;
  }
}

/* ===== Batch Operations ===== */
async function batchSetSync(val) {
  const docs = state.documents;
  const paths = docs.map(d => d.path);
  if (!paths.length) return;
  try {
    await api('api/metadata/batch', { method: 'POST', body: JSON.stringify({ paths, updates: { sync_to_kb: val } }) });
    docs.forEach(d => d.sync_to_kb = val);
    renderTree(); loadStatus();
    if (state.currentDoc) {
      document.getElementById('toggleSync').checked = !!state.currentDoc.sync_to_kb;
    }
    toast(`已批量${val ? '开启' : '关闭'}同步 (${paths.length} 篇)`, 'success');
  } catch (e) { toast('批量操作失败: ' + e.message, 'error'); }
}

async function batchSetChunk(val) {
  const docs = state.documents;
  const paths = docs.map(d => d.path);
  if (!paths.length) return;
  try {
    await api('api/metadata/batch', { method: 'POST', body: JSON.stringify({ paths, updates: { pre_chunk: val } }) });
    docs.forEach(d => d.pre_chunk = val);
    renderTree(); loadStatus();
    if (state.currentDoc) {
      document.getElementById('toggleChunk').checked = state.currentDoc.pre_chunk !== false;
    }
    toast(`已批量${val ? '开启' : '关闭'}预切块 (${paths.length} 篇)`, 'success');
  } catch (e) { toast('批量操作失败: ' + e.message, 'error'); }
}

async function batchClear() {
  const docs = state.documents;
  const paths = docs.map(d => d.path);
  if (!paths.length) return;
  try {
    await api('api/metadata/batch', { method: 'POST', body: JSON.stringify({ paths, updates: { sync_to_kb: false, pre_chunk: false } }) });
    docs.forEach(d => { d.sync_to_kb = false; d.pre_chunk = false; });
    renderTree(); loadStatus();
    if (state.currentDoc) {
      document.getElementById('toggleSync').checked = false;
      document.getElementById('toggleChunk').checked = false;
    }
    toast(`已取消全部选择 (${paths.length} 篇)`, 'success');
  } catch (e) { toast('批量操作失败: ' + e.message, 'error'); }
}

/* ===== Document Viewer ===== */
async function selectDoc(path) {
  if (state.editing) { if (!confirm('正在编辑，放弃修改？')) return; state.editing = false; }
  const doc = state.docMap[path];
  if (!doc) return;
  state.currentDoc = doc;
  renderTree();
  const name = (doc.path || '').split('/').pop();
  document.getElementById('viewerTitle').innerHTML = `<span>📄</span> ${esc(name)}`;
  // Show toggles
  document.getElementById('docToggles').style.display = 'flex';
  document.getElementById('toggleSyncWrap').style.display = '';
  document.getElementById('toggleChunkWrap').style.display = '';
  document.getElementById('toggleSync').checked = !!doc.sync_to_kb;
  document.getElementById('toggleChunk').checked = doc.pre_chunk !== false;
  document.getElementById('viewerActions').style.display = '';
  document.getElementById('viewerContent').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;"><span class="loading loading-spinner loading-lg text-primary"></span></div>';
  try {
    const data = await api('api/document', { params: { path } });
    state.originalContent = data.content || '';
    renderMarkdown(state.originalContent);
  } catch (e) {
    document.getElementById('viewerContent').innerHTML = `<div class="empty-state"><span style="font-size:2.5rem;">❌</span><span style="font-size:0.82rem;">加载失败: ${esc(e.message)}</span></div>`;
  }
}

function renderMarkdown(text) {
  document.getElementById('viewerContent').innerHTML = `<div class="md-render">${mdToHtml(text)}</div>`;
  postRender();
  buildToc();
}

function mdToHtml(md) {
  if (!md) return '';
  
  // 0. 提取并渲染 YAML frontmatter
  let frontmatterHtml = '';
  let body = md;
  const fmMatch = md.match(/^---\n([\s\S]*?)\n---\n?/);
  if (fmMatch) {
    body = md.slice(fmMatch[0].length);
    const fm = {};
    let currentKey = '';
    let inArray = false;
    fmMatch[1].split('\n').forEach(line => {
      // 数组项
      if (/^\s*-\s+"?(.+?)"?\s*$/.test(line) && currentKey) {
        const val = line.match(/^\s*-\s+"?(.+?)"?\s*$/)[1];
        if (!Array.isArray(fm[currentKey])) fm[currentKey] = [];
        fm[currentKey].push(val);
        inArray = true;
        return;
      }
      inArray = false;
      const m = line.match(/^(\w[\w-]*):\s*"?([^"]*)"?\s*$/);
      if (m) {
        currentKey = m[1];
        fm[currentKey] = m[2] || '';
      }
    });
    // 渲染为元数据卡片
    const labels = {
      title: '📌 标题', source: '🔗 来源', author: '✍️ 作者',
      published: '📅 发布', created: '📅 创建', description: '📝 描述',
      tags: '🏷️ 标签', category: '📂 分类', url: '🔗 链接',
    };
    const rows = Object.entries(fm).filter(([k, v]) => v && (!Array.isArray(v) || v.length)).map(([k, v]) => {
      const label = labels[k] || k;
      let val = Array.isArray(v) ? v.map(t => `<span class="badge badge-sm badge-ghost">${esc(t)}</span>`).join(' ') : esc(v);
      if (k === 'source' || k === 'url') val = `<a href="${esc(v)}" target="_blank" rel="noopener">${esc(v)}</a>`;
      if (k === 'title') val = `<strong>${esc(v)}</strong>`;
      return `<tr><td style="opacity:0.6;white-space:nowrap;padding:2px 12px 2px 0;">${label}</td><td style="padding:2px 0;">${val}</td></tr>`;
    }).join('');
    if (rows) {
      frontmatterHtml = `<div class="callout callout-type-info" style="margin-bottom:1rem;"><table style="font-size:0.84rem;border-collapse:collapse;">${rows}</table></div>`;
    }
  }
  
  // 1. 预处理：保护数学公式不被 marked 处理
  const mathBlocks = [];
  let processed = body.replace(/\$\$([\s\S]*?)\$\$/g, (match, p1) => {
    mathBlocks.push({ type: 'block', content: p1.trim() });
    return `%%MATH_BLOCK_${mathBlocks.length - 1}%%`;
  });
  processed = processed.replace(/\$([^\$\n]+?)\$/g, (match, p1) => {
    mathBlocks.push({ type: 'inline', content: p1.trim() });
    return `%%MATH_BLOCK_${mathBlocks.length - 1}%%`;
  });
  
  // 2. 预处理：Callout 块 (> [!type] Title)
  processed = processed.replace(/^>\s*\[!(\w+)\]\s*(.*)\n((?:>.*\n?)*)/gm, (match, type, title, body) => {
    const iconMap = { note: '📝', info: 'ℹ️', tip: '💡', warning: '⚠️', danger: '🚨', quote: '💬' };
    const icon = iconMap[type.toLowerCase()] || '📌';
    const cleanBody = body.replace(/^>\s?/gm, '').trim();
    return `<div class="callout callout-type-${type.toLowerCase()}"><div class="callout-title">${icon} ${title || type}</div><div class="callout-body">${cleanBody}</div></div>\n`;
  });
  
  // 3. 预处理：嵌入 ![[...]]（必须在 Wikilink 之前处理）
  processed = processed.replace(/!\[\[([^\]|]+)(\|([^\]]*))?\]\]/g, (match, ref, _, alt) => {
    const isImage = /\.(png|jpg|jpeg|gif|svg|webp|bmp)$/i.test(ref);
    if (isImage) {
      // 图片嵌入：尝试从暂存区加载
      return `<div class="embed-image"><img src="/api/document/image?path=${encodeURIComponent(ref)}" alt="${alt || ref}" loading="lazy" onclick="openLightbox(this.src)"></div>`;
    } else {
      // 文档嵌入：显示为可点击的引用卡片
      const displayName = alt || ref;
      return `<div class="embed-doc" onclick="handleWikilink('${ref}')">
        <div class="embed-doc-icon">📄</div>
        <div class="embed-doc-content">
          <div class="embed-doc-title">${displayName}</div>
          <div class="embed-doc-hint">点击打开文档</div>
        </div>
      </div>`;
    }
  });
  
  // 4. 预处理：Wikilink [[page|text]] 或 [[page]]（排除已处理的嵌入）
  processed = processed.replace(/\[\[([^\]|]+)(\|([^\]]*))?\]\]/g, (match, page, _, text) => {
    const display = text || page;
    return `<span class="wikilink" data-page="${page}" onclick="handleWikilink('${page}')">${display}</span>`;
  });
  
  // 4. Configure marked
  marked.setOptions({
    breaks: true,
    gfm: true,
    highlight: function(code, lang) {
      if (lang === 'mermaid') return code; // Mermaid 不做语法高亮
      if (lang && hljs.getLanguage(lang)) {
        return hljs.highlight(code, { language: lang }).value;
      }
      return hljs.highlightAuto(code).value;
    }
  });
  
  // 5. 自定义 renderer 处理代码块
  const renderer = new marked.Renderer();
  renderer.code = function({ text, lang, escaped }) {
    const code = text;
    if (lang === 'mermaid') {
      return `<div class="mermaid">${code}</div>`;
    }
    const language = lang || '';
    const highlighted = language && hljs.getLanguage(language) 
      ? hljs.highlight(code, { language }).value 
      : hljs.highlightAuto(code).value;
    const lines = code.split('\n');
    const lineNumbers = lines.map((_, i) => `<span>${i + 1}</span>`).join('\n');
    const langLabel = language ? `<span class="code-lang">${language}</span>` : '<span class="code-lang">text</span>';
    return `<div class="code-block-wrapper">
      <div class="code-block-header">
        ${langLabel}
        <button class="code-copy-btn" onclick="copyCode(this)" data-code="${esc(code)}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          复制
        </button>
      </div>
      <div class="code-lines">
        <div class="code-line-numbers">${lineNumbers}</div>
        <pre class="code-content"><code class="hljs language-${language}">${highlighted}</code></pre>
      </div>
    </div>`;
  };
  
  let html = marked.parse(processed, { renderer });
  
  // 6. 恢复数学公式
  mathBlocks.forEach((block, i) => {
    const placeholder = `%%MATH_BLOCK_${i}%%`;
    try {
      if (block.type === 'block') {
        const rendered = katex.renderToString(block.content, { displayMode: true, throwOnError: false });
        html = html.replace(placeholder, `<div class="math-block" style="text-align:center;margin:1rem 0;overflow-x:auto;">${rendered}</div>`);
      } else {
        const rendered = katex.renderToString(block.content, { displayMode: false, throwOnError: false });
        html = html.replace(placeholder, rendered);
      }
    } catch (e) {
      html = html.replace(placeholder, `<code style="color:var(--color-error)">${esc(block.content)}</code>`);
    }
  });
  
  return frontmatterHtml + html;
}

function copyCode(btn) {
  const code = btn.dataset.code;
  const _showOk = () => {
    btn.classList.add('copied');
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> 已复制';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 复制';
    }, 2000);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(code).then(_showOk);
  } else {
    // HTTP fallback
    const ta = document.createElement('textarea');
    ta.value = code; ta.style.cssText = 'position:fixed;left:-9999px;';
    document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    _showOk();
  }
}

function handleWikilink(page) {
  // 尝试在当前文件列表中查找匹配的文档
  const match = state.treeData?.find(d => d.path?.includes(page) || d.name?.includes(page));
  if (match) {
    loadDocument(match.path);
  } else {
    showToast(`未找到文档: ${page}`, 'warning');
  }
}

/* ===== Search Highlight ===== */
let searchHighlightState = {
  active: false,
  keyword: '',
  matches: [],
  currentIndex: -1
};

function toggleSearchHighlight() {
  const bar = document.getElementById('searchHighlightBar');
  searchHighlightState.active = !searchHighlightState.active;
  if (searchHighlightState.active) {
    bar.style.display = 'flex';
    document.getElementById('searchHighlightInput').focus();
  } else {
    bar.style.display = 'none';
    clearSearchHighlight();
  }
}

function onSearchHighlight(keyword) {
  searchHighlightState.keyword = keyword;
  clearSearchHighlight();
  
  if (!keyword || keyword.length < 1) {
    document.getElementById('searchHighlightCount').textContent = '';
    return;
  }
  
  const viewer = document.getElementById('viewerContent');
  const walker = document.createTreeWalker(viewer, NodeFilter.SHOW_TEXT, null, false);
  const textNodes = [];
  let node;
  while (node = walker.nextNode()) {
    textNodes.push(node);
  }
  
  textNodes.forEach(textNode => {
    const text = textNode.textContent;
    const regex = new RegExp(`(${escapeRegex(keyword)})`, 'gi');
    if (regex.test(text)) {
      const span = document.createElement('span');
      span.innerHTML = text.replace(regex, '<mark class="search-highlight">$1</mark>');
      textNode.parentNode.replaceChild(span, textNode);
    }
  });
  
  searchHighlightState.matches = viewer.querySelectorAll('.search-highlight');
  searchHighlightState.currentIndex = -1;
  
  if (searchHighlightState.matches.length > 0) {
    document.getElementById('searchHighlightCount').textContent = `${searchHighlightState.matches.length} 个匹配`;
    searchHighlightNext();
  } else {
    document.getElementById('searchHighlightCount').textContent = '无匹配';
  }
}

function searchHighlightNext() {
  if (searchHighlightState.matches.length === 0) return;
  
  if (searchHighlightState.currentIndex >= 0) {
    searchHighlightState.matches[searchHighlightState.currentIndex].classList.remove('search-highlight-active');
  }
  
  searchHighlightState.currentIndex = (searchHighlightState.currentIndex + 1) % searchHighlightState.matches.length;
  const current = searchHighlightState.matches[searchHighlightState.currentIndex];
  current.classList.add('search-highlight-active');
  current.scrollIntoView({ behavior: 'smooth', block: 'center' });
  
  document.getElementById('searchHighlightCount').textContent = 
    `${searchHighlightState.currentIndex + 1}/${searchHighlightState.matches.length}`;
}

function searchHighlightPrev() {
  if (searchHighlightState.matches.length === 0) return;
  
  if (searchHighlightState.currentIndex >= 0) {
    searchHighlightState.matches[searchHighlightState.currentIndex].classList.remove('search-highlight-active');
  }
  
  searchHighlightState.currentIndex = (searchHighlightState.currentIndex - 1 + searchHighlightState.matches.length) % searchHighlightState.matches.length;
  const current = searchHighlightState.matches[searchHighlightState.currentIndex];
  current.classList.add('search-highlight-active');
  current.scrollIntoView({ behavior: 'smooth', block: 'center' });
  
  document.getElementById('searchHighlightCount').textContent = 
    `${searchHighlightState.currentIndex + 1}/${searchHighlightState.matches.length}`;
}

function clearSearchHighlight() {
  const viewer = document.getElementById('viewerContent');
  viewer.querySelectorAll('.search-highlight').forEach(el => {
    el.outerHTML = el.textContent;
  });
  // 清理可能产生的空 span
  viewer.querySelectorAll('span:empty').forEach(el => el.remove());
  searchHighlightState.matches = [];
  searchHighlightState.currentIndex = -1;
}

function escapeRegex(string) {
  return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function buildToc() {
  const tocPanel = document.getElementById('tocPanel');
  const tocList = document.getElementById('tocList');
  const viewer = document.getElementById('viewerContent');
  const headings = viewer.querySelectorAll('h1, h2, h3, h4, h5, h6');

  if (headings.length < 2) {
    tocPanel.classList.remove('visible');
    tocList.innerHTML = '';
    return;
  }

  tocPanel.classList.add('visible');
  tocList.innerHTML = '';

  headings.forEach((h, i) => {
    const id = `heading-${i}`;
    h.id = id;
    const level = parseInt(h.tagName[1]);
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.className = `toc-h${level}`;
    a.textContent = h.textContent;
    a.dataset.target = id;
    a.onclick = () => {
      h.scrollIntoView({ behavior: 'smooth', block: 'start' });
      // Update active state
      tocList.querySelectorAll('a').forEach(el => el.classList.remove('active'));
      a.classList.add('active');
    };
    li.appendChild(a);
    tocList.appendChild(li);
  });

  // Scroll spy
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const id = entry.target.id;
        tocList.querySelectorAll('a').forEach(a => {
          a.classList.toggle('active', a.dataset.target === id);
        });
      }
    });
  }, { root: viewer, rootMargin: '-10% 0px -80% 0px' });

  headings.forEach(h => observer.observe(h));
}

function postRender() {
  // 链接新窗口打开
  document.querySelectorAll('.md-render a').forEach(el => {
    if (!el.getAttribute('target')) {
      el.setAttribute('target', '_blank');
      el.setAttribute('rel', 'noopener');
    }
  });
  
  // 图片 Lightbox
  document.querySelectorAll('.md-render img').forEach(img => {
    img.style.cursor = 'zoom-in';
    img.onclick = () => openLightbox(img.src);
  });
  
  // Mermaid 渲染
  const mermaidDivs = document.querySelectorAll('.mermaid');
  if (mermaidDivs.length > 0) {
    mermaid.initialize({ 
      startOnLoad: false, 
      theme: document.documentElement.dataset.theme === 'dark' ? 'dark' : 'default',
      securityLevel: 'loose'
    });
    mermaidDivs.forEach((div, i) => {
      div.id = `mermaid-${i}-${Date.now()}`;
      try {
        mermaid.render(div.id + '-svg', div.textContent).then(({ svg }) => {
          div.innerHTML = svg;
        }).catch(e => {
          div.innerHTML = `<pre style="color:var(--color-error)">${esc(div.textContent)}</pre>`;
        });
      } catch (e) {
        div.innerHTML = `<pre style="color:var(--color-error)">${esc(div.textContent)}</pre>`;
      }
    });
  }
  
  // 代码块兜底：强制校正行号和复制按钮样式
  document.querySelectorAll('.code-block-wrapper').forEach(wrapper => {
    const lines = wrapper.querySelector('.code-lines');
    const lineNums = wrapper.querySelector('.code-line-numbers');
    const header = wrapper.querySelector('.code-block-header');
    const pre = wrapper.querySelector('pre');
    if (lines) { lines.style.display = 'flex'; }
    if (lineNums) {
      lineNums.style.display = 'flex';
      lineNums.style.flexDirection = 'column';
      lineNums.style.paddingTop = '36px';
    }
    if (lineNums) {
      lineNums.querySelectorAll('span').forEach(s => { s.style.display = 'block'; });
    }
    if (header) { header.style.position = 'absolute'; header.style.zIndex = '2'; }
    if (pre) { pre.style.paddingTop = '36px'; pre.style.margin = '0'; pre.style.lineHeight = '1.6'; pre.style.fontSize = '12px'; }
    // 强制所有子元素 line-height 和 font-size 一致
    if (pre) pre.querySelectorAll('*').forEach(el => { el.style.lineHeight = '1.6'; el.style.fontSize = '12px'; });
  });
}

/* ===== New Document ===== */
function openNewDocDialog() {
  const sel = document.getElementById('newDocFolder');
  sel.innerHTML = '<option value="">根目录</option>';
  // Collect all folders from tree
  function addFolders(node, prefix) {
    for (const [name, val] of Object.entries(node)) {
      if (name === '__files__') continue;
      const fullPath = prefix ? `${prefix}/${name}` : name;
      sel.innerHTML += `<option value="${esc(fullPath)}">${esc(fullPath)}</option>`;
      if (typeof val === 'object' && val !== null) addFolders(val, fullPath);
    }
  }
  addFolders(state.folderTree, '');
  document.getElementById('newDocName').value = '';
  document.getElementById('newDocModal').showModal();
}

/* ===== Sync Progress (SSE) ===== */
const PHASE_LABELS = {
  listing: '📋 扫描 FNS...', fetching: '📥 获取文档内容...',
  processing: '📝 处理文档...', preparing: '🔧 准备同步...',
  syncing: '📤 同步到知识库...', uploading: '☁️ 上传到 FNS...',
  done: '✅ 完成',
};

function startProgress(syncType, label) {
  const el = document.getElementById('syncProgress');
  document.getElementById('progressLabel').textContent = label;
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('progressText').textContent = '';
  el.classList.add('active');
  const url = `api/sync/progress?type=${syncType}`;
  const es = isBridge() ? null : new EventSource(url);
  if (es) {
    es.onmessage = (ev) => {
      try {
        const d = JSON.parse(ev.data);
        const lbl = PHASE_LABELS[d.phase] || d.phase;
        document.getElementById('progressLabel').textContent = lbl;
        if (d.total > 0) {
          const pct = Math.round((d.current / d.total) * 100);
          document.getElementById('progressFill').style.width = pct + '%';
          document.getElementById('progressText').textContent = `${d.current}/${d.total}`;
        }
        if (d.phase === 'done') { es.close(); }
      } catch(e) {}
    };
    es.onerror = () => { es.close(); };
  }
  return es;
}

function closeProgress() {
  document.getElementById('syncProgress').classList.remove('active');
}

async function syncFns() {
  const btn = document.getElementById('btnSyncFns');
  btn.disabled = true; btn.innerHTML = '<span class="loading loading-spinner loading-xs"></span> 同步中...';

  try {
    const data = await api('api/sync/fns', { method: 'POST' });
    if (data.error) { toast('FNS 同步失败: ' + data.error, 'error'); return; }
    state.lastFnsSync = Date.now() / 1000;
    toast(`FNS 同步完成: 新增 ${data.new||0}, 更新 ${data.updated||0}, 未变 ${data.unchanged||0}`, 'success');
    await Promise.all([loadFolders(), loadDocuments(), loadStatus()]);
    renderTree();
    checkConflicts(); // FNS 同步后重新检测冲突
  } catch (e) { toast('FNS 同步失败: ' + e.message, 'error'); }
  finally { btn.disabled = false; btn.innerHTML = '📥 从 FNS 同步'; if(es) es.close(); closeProgress(); }
}

/* ===== Sync History ===== */
async function openSyncHistory() {
  const modal = document.getElementById('historyModal');
  const body = document.getElementById('historyBody');
  body.innerHTML = '<div style="text-align:center;padding:20px;"><span class="loading loading-spinner loading-md text-primary"></span></div>';
  modal.showModal();
  try {
    const data = await api('api/sync/history');
    if (!Array.isArray(data) || data.length === 0) {
      body.innerHTML = '<div style="text-align:center;padding:30px;opacity:0.5;">暂无同步记录</div>';
      return;
    }
    const typeIcons = {fns:'📥 FNS→暂存',kb:'📤 暂存→知识库',to_fns:'☁️ 暂存→FNS'};
    const statusIcons = {ok:'✅',error:'❌'};
    let html = '<div style="display:flex;flex-direction:column;gap:8px;">';
    for (const r of data) {
      const icon = typeIcons[r.type]||r.type;
      const st = statusIcons[r.status]||'';
      const dur = r.duration ? r.duration.toFixed(1)+'s' : '--';
      const ts = r.start_time ? fmtTime(r.start_time) : '--';
      const stats = [];
      if (r.new) stats.push(`新增 ${r.new}`);
      if (r.updated) stats.push(`更新 ${r.updated}`);
      if (r.uploaded) stats.push(`成功 ${r.uploaded}`);
      if (r.unchanged) stats.push(`未变 ${r.unchanged}`);
      if (r.skipped) stats.push(`跳过 ${r.skipped}`);
      if (r.deleted) stats.push(`删除 ${r.deleted}`);
      if (r.errors) stats.push(`错误 ${r.errors}`);
      html += `<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:var(--color-base-200);font-size:0.82rem;">
        <span>${st}</span>
        <span style="font-weight:600;min-width:110px;">${icon}</span>
        <span style="opacity:0.6;min-width:100px;">${ts}</span>
        <span style="flex:1;">${stats.join(' · ')||'无变更'}</span>
        <span style="opacity:0.5;">${dur}</span>
      </div>`;
    }
    html += '</div>';
    body.innerHTML = html;
  } catch (e) {
    body.innerHTML = `<div style="text-align:center;padding:20px;color:#ef4444;">加载失败: ${esc(e.message)}</div>`;
  }
}

/* ===== Conflict Detection ===== */
let _conflicts = [];

async function checkConflicts() {
  try {
    const data = await api('api/conflicts');
    _conflicts = data.conflicts || [];
    const btn = document.getElementById('btnConflicts');
    const badge = document.getElementById('conflictCount');
    if (_conflicts.length > 0) {
      btn.style.display = '';
      badge.textContent = _conflicts.length;
    } else {
      btn.style.display = 'none';
    }
  } catch (e) {
    // 静默失败，不影响用户体验
    console.warn('冲突检测失败:', e);
  }
}

async function openConflicts() {
  const modal = document.getElementById('conflictModal');
  const body = document.getElementById('conflictBody');
  const batchDiv = document.getElementById('conflictBatchActions');
  body.innerHTML = '<div style="text-align:center;padding:20px;"><span class="loading loading-spinner loading-md text-primary"></span></div>';
  batchDiv.style.display = 'none';
  modal.showModal();
  try {
    const data = await api('api/conflicts');
    _conflicts = data.conflicts || [];
    const badge = document.getElementById('conflictCount');
    badge.textContent = _conflicts.length;
    const btn = document.getElementById('btnConflicts');
    btn.style.display = _conflicts.length > 0 ? '' : 'none';

    if (_conflicts.length === 0) {
      body.innerHTML = '<div style="text-align:center;padding:30px;opacity:0.5;">🎉 没有发现冲突，一切正常！</div>';
      return;
    }

    batchDiv.style.display = '';
    const typeLabels = {
      'both_modified': { icon: '🔴', label: '双方修改', color: '#ef4444' },
      'remote_modified': { icon: '🟡', label: 'FNS 已修改', color: '#f59e0b' },
      'remote_deleted': { icon: '⚫', label: 'FNS 已删除', color: '#6b7280' },
    };

    let html = `<div style="display:flex;flex-direction:column;gap:6px;">`;
    html += `<div style="font-size:0.82rem;opacity:0.6;padding:0 4px;">共 ${_conflicts.length} 个冲突</div>`;

    for (let i = 0; i < _conflicts.length; i++) {
      const c = _conflicts[i];
      const t = typeLabels[c.type] || { icon: '❓', label: c.type, color: '#6b7280' };
      const name = c.path.split('/').pop();
      const folder = c.path.includes('/') ? c.path.split('/').slice(0, -1).join('/') : '';
      const sizeStr = c.size_kb ? `${c.size_kb.toFixed(1)}KB` : '';

      let actions = '';
      if (c.type === 'remote_deleted') {
        actions = `
          <button class="btn btn-xs btn-ghost border border-base-300" onclick="resolveConflict(${i},'keep_local')">💾 保留暂存</button>
          <button class="btn btn-xs btn-error btn-outline" onclick="resolveConflict(${i},'keep_fns')">🗑️ 删除</button>`;
      } else {
        actions = `
          <button class="btn btn-xs btn-ghost border border-base-300" onclick="resolveConflict(${i},'keep_fns')">📥 用 FNS</button>
          <button class="btn btn-xs btn-ghost border border-base-300" onclick="resolveConflict(${i},'keep_local')">💾 保留暂存</button>
          <button class="btn btn-xs btn-ghost" onclick="resolveConflict(${i},'skip')">跳过</button>`;
      }

      html += `<div id="conflict-row-${i}" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;background:var(--color-base-200);font-size:0.82rem;border-left:3px solid ${t.color};">
        <span style="font-size:1rem;" title="${t.label}">${t.icon}</span>
        <div style="flex:1;min-width:0;">
          <div style="font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${esc(c.path)}">${esc(name)}</div>
          <div style="font-size:0.75rem;opacity:0.5;">${esc(folder)}${sizeStr ? ' · ' + sizeStr : ''}</div>
        </div>
        <div style="display:flex;gap:4px;flex-shrink:0;">
          ${actions}
        </div>
      </div>`;
    }
    html += '</div>';
    body.innerHTML = html;
  } catch (e) {
    body.innerHTML = `<div style="text-align:center;padding:20px;color:#ef4444;">加载失败: ${esc(e.message)}</div>`;
  }
}

async function resolveConflict(idx, resolution) {
  const c = _conflicts[idx];
  if (!c) return;
  const row = document.getElementById(`conflict-row-${idx}`);
  if (row) row.style.opacity = '0.4';
  try {
    const result = await api('api/conflicts/resolve', {
      method: 'POST',
      body: JSON.stringify({ path: c.path, resolution })
    });
    if (result.success) {
      const actionLabels = { kept_fns: '已用 FNS 版本', kept_local: '已保留暂存版', skipped: '已跳过' };
      toast(actionLabels[result.action] || '已解决', 'success');
      _conflicts.splice(idx, 1);
      // 重新渲染
      openConflicts();
      // 更新 badge
      const badge = document.getElementById('conflictCount');
      badge.textContent = _conflicts.length;
      document.getElementById('btnConflicts').style.display = _conflicts.length > 0 ? '' : 'none';
      // 刷新文档列表
      loadDocuments();
    } else {
      toast(result.error || '解决失败', 'error');
      if (row) row.style.opacity = '1';
    }
  } catch (e) {
    toast('解决失败: ' + e.message, 'error');
    if (row) row.style.opacity = '1';
  }
}

async function resolveAllConflicts(resolution) {
  if (_conflicts.length === 0) return;
  const paths = _conflicts.map(c => c.path);
  const label = resolution === 'keep_fns' ? '全部用 FNS 版本覆盖' : '全部保留暂存版本';
  if (!confirm(`确定要 ${label} 吗？（${paths.length} 个文档）`)) return;
  try {
    const result = await api('api/conflicts/resolve-batch', {
      method: 'POST',
      body: JSON.stringify({ paths, resolution })
    });
    toast(`已解决 ${result.resolved || 0} 个冲突${result.errors ? '，' + result.errors + ' 个失败' : ''}`, result.errors ? 'warning' : 'success');
    _conflicts = [];
    document.getElementById('btnConflicts').style.display = 'none';
    document.getElementById('conflictModal').close();
    loadDocuments();
  } catch (e) {
    toast('批量解决失败: ' + e.message, 'error');
  }
}

/* ===== Utilities ===== */
function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;') : ''; }

/* ===== Settings ===== */
async function openSettings() {
  const modal = document.getElementById('settingsModal');
  const body = document.getElementById('settingsBody');
  body.innerHTML = '<div style="text-align:center;padding:20px;"><span class="loading loading-spinner loading-md text-primary"></span></div>';
  modal.showModal();
  try {
    const data = await api('api/config');
    let html = '<form id="settingsForm" style="display:flex;flex-direction:column;gap:14px;">';
    for (const [key, meta] of Object.entries(data)) {
      const id = `cfg_${key}`;
      const hint = meta.hint ? `<div style="font-size:0.72rem;opacity:0.5;margin-top:2px;">${esc(meta.hint)}</div>` : '';
      if (meta.type === 'bool') {
        html += `<div style="display:flex;align-items:center;justify-content:space-between;">
          <div><label for="${id}" style="font-size:0.85rem;font-weight:500;">${esc(meta.desc)}</label>${hint}</div>
          <input type="checkbox" class="toggle toggle-xs toggle-primary" id="${id}" data-key="${key}" ${meta.value ? 'checked' : ''}>
        </div>`;
      } else if (meta.type === 'list') {
        const val = Array.isArray(meta.value) ? meta.value.join(', ') : meta.value;
        html += `<div>
          <label for="${id}" style="font-size:0.85rem;font-weight:500;">${esc(meta.desc)}</label>${hint}
          <input type="text" id="${id}" data-key="${key}" value="${esc(val)}" style="margin-top:4px;width:100%;padding:6px 10px;font-size:0.82rem;border:1px solid var(--color-base-300);border-radius:6px;background:var(--color-base-200);color:var(--color-base-content);outline:none;">
        </div>`;
      } else {
        const inputType = meta.type === 'int' ? 'number' : (meta.secret ? 'password' : 'text');
        html += `<div>
          <label for="${id}" style="font-size:0.85rem;font-weight:500;">${esc(meta.desc)}</label>${hint}
          <input type="${inputType}" id="${id}" data-key="${key}" value="${esc(String(meta.value ?? ''))}" style="margin-top:4px;width:100%;padding:6px 10px;font-size:0.82rem;border:1px solid var(--color-base-300);border-radius:6px;background:var(--color-base-200);color:var(--color-base-content);outline:none;" ${meta.type === 'int' ? 'step="1"' : ''}>
        </div>`;
      }
    }
    html += '</form>';
    body.innerHTML = html;
  } catch (e) {
    body.innerHTML = `<div style="text-align:center;padding:20px;color:var(--color-error);">加载失败: ${esc(e.message)}</div>`;
  }
}

async function saveSettings() {
  const form = document.getElementById('settingsForm');
  if (!form) return;
  const payload = {};
  form.querySelectorAll('[data-key]').forEach(el => {
    const key = el.dataset.key;
    if (el.type === 'checkbox') {
      payload[key] = el.checked;
    } else if (el.type === 'number') {
      payload[key] = el.value === '' ? 0 : parseInt(el.value, 10);
    } else {
      payload[key] = el.value;
    }
  });
  try {
    const result = await api('api/config/save', { method: 'POST', body: JSON.stringify(payload) });
    document.getElementById('settingsModal').close();
    toast(`配置已保存 (${result.saved?.length || 0} 项)`, 'success');
  } catch (e) {
    toast('保存失败: ' + e.message, 'error');
  }
}

/* ===== Init ===== */
async function init() {
  if (isBridge()) {
    try { await Promise.race([bridge.ready(), new Promise((_, r) => setTimeout(() => r(new Error('timeout')), 3000))]); }
    catch (e) { console.warn('bridge:', e.message); }
  }
  initTheme();
  if (isBridge()) {
    bridge.onContext(ctx => {
      if (ctx && ctx.isDark !== undefined) {
        document.documentElement.setAttribute('data-theme', ctx.isDark ? 'dark' : 'light');
        document.getElementById('themeToggle').checked = ctx.isDark;
      }
    });
  }
  await Promise.all([loadFolders(), loadDocuments()]);
  renderTree();
  await loadStatus();
  setInterval(loadStatus, 30000);
  checkConflicts(); // 异步检测冲突，不阻塞初始化
}

document.addEventListener('keydown', e => { if ((e.ctrlKey||e.metaKey) && e.key==='s') { e.preventDefault(); saveDoc(); } });
init().catch(e => { console.error('Init failed:', e); toast('初始化失败: ' + e.message, 'error'); });
window.onerror = (msg, url, line) => { console.error('Global error:', msg, url, line); toast(`JS Error: ${msg} (L${line})`, 'error'); };
window.addEventListener('unhandledrejection', e => { console.error('Unhandled:', e.reason); toast('Error: ' + (e.reason?.message||'unknown'), 'error'); });
</script>
